    freqChips.appendChild(b);
  });

  // day-of-week grid
  const dowGrid = $('task-dow-grid');
  t('cal_days').split(',').forEach((label,i)=>{
    const isWe = i>=5;
    const btn = document.createElement('button');
    btn.style.cssText=`
      aspect-ratio:1;border-radius:10px;border:2px solid var(--border);
      background:var(--bg3);cursor:pointer;font-size:12px;font-weight:800;
      color:${isWe?'var(--red)':'var(--text2)'};transition:all 0.15s;
      display:flex;align-items:center;justify-content:center;
    `;
    btn.textContent=label;
    if(selDays.has(i)){ btn.style.background='rgba(109,123,230,0.2)'; btn.style.borderColor='var(--blue)'; btn.style.color='var(--blue2)'; }
    btn.onclick=()=>{
      if(selDays.has(i)){ selDays.delete(i); btn.style.background='var(--bg3)'; btn.style.borderColor='var(--border)'; btn.style.color=isWe?'var(--red)':'var(--text2)'; }
      else { selDays.add(i); btn.style.background='rgba(109,123,230,0.2)'; btn.style.borderColor='var(--blue)'; btn.style.color='var(--blue2)'; }
      const names=['Pn','Wt','Śr','Cz','Pt','Sb','Nd'];
      $('task-dow-hint').textContent = selDays.size>0 ? 'Wybrane: '+[...selDays].sort().map(d=>names[d]).join(', ') : '';
    };
    dowGrid.appendChild(btn);
  });
  if(selDays.size>0){
    const names=['Pn','Wt','Śr','Cz','Pt','Sb','Nd'];
    $('task-dow-hint').textContent = 'Wybrane: '+[...selDays].sort().map(d=>names[d]).join(', ');
  }

  // diff chips
  const diffChips = $('task-diff-chips');
  Object.keys(DIFF_LBL).forEach(v=>{
    const b=document.createElement('button');
    b.className=`chip${v===selDiff?' on':''}`;
    b.textContent=`${DIFF_STARS[v]} ${getDiff(v)} (${DIFF_PTS[v]} ${t('points_abbr')||'pkt'})`;
    b.onclick=()=>{ selDiff=v; diffChips.querySelectorAll('.chip').forEach(c=>c.classList.remove('on')); b.classList.add('on'); };
    diffChips.appendChild(b);
  });
  const apprChips = $('task-appr-chips');
  [['false','Nie'],['true','Tak']].forEach(([v,l])=>{
    const b=document.createElement('button');
    b.className=`chip${v==='false'?' on':''}`;
    b.textContent=l;
    b.onclick=()=>{ selAppr=(v==='true'); apprChips.querySelectorAll('.chip').forEach(c=>c.classList.remove('on')); b.classList.add('on'); };
    apprChips.appendChild(b);
  });

  window.setTaskType = (type)=>{
    selOneTime = type==='once';
    $('type-tab-cycl').style.background = selOneTime?'transparent':'var(--blue)';
    $('type-tab-cycl').style.color = selOneTime?'var(--muted2)':'#fff';
    $('type-tab-once').style.background = selOneTime?'var(--blue)':'transparent';
    $('type-tab-once').style.color = selOneTime?'#fff':'var(--muted2)';
    $('task-schedule-wrap').style.display = selOneTime?'none':'block';
    $('task-type-hint').textContent = selOneTime
      ? '⚡ Zadanie zniknie po wykonaniu. Idealne np. "Umyć okna przed świętami".'
      : '🔄 Zadanie będzie powtarzać się według harmonogramu.';
  };

  window.setSchedMode = (mode)=>{
    schedMode = mode;
    const isFreq = mode==='freq';
    $('sched-tab-freq').style.background = isFreq?'var(--blue)':'transparent';
    $('sched-tab-freq').style.color = isFreq?'#fff':'var(--muted2)';
    $('sched-tab-days').style.background = isFreq?'transparent':'var(--blue)';
    $('sched-tab-days').style.color = isFreq?'var(--muted2)':'#fff';
    $('sched-freq-panel').style.display = isFreq?'block':'none';
    $('sched-days-panel').style.display = isFreq?'none':'block';
  };

  window._getTaskForm=()=>{
    if(selOneTime) return {freq:'weekly', diff:selDiff, approvalNeeded:selAppr, specificDays:null, oneTime:true};
    if(schedMode==='days'){
      if(selDays.size===0){ alert('Wybierz przynajmniej jeden dzień!'); return null; }
      return {freq:'custom', diff:selDiff, approvalNeeded:selAppr, specificDays:[...selDays].sort().join(','), oneTime:false};
    }
    return {freq:selFreq, diff:selDiff, approvalNeeded:selAppr, specificDays:null, oneTime:false};
  };

  window.setTaskType(selOneTime?'once':'cyclic');
  window.setSchedMode(schedMode);
}

async function submitAddTask(editId=null){
  const f = window._getTaskForm();
  if(!f) return;
  const name=$('task-name').value.trim();
  const roomId=$('task-room').value;
  const assignedTo=$('task-member').value;
  if(!name||!roomId||!assignedTo) return;
  if(editId) await PUT(`/api/tasks/${editId}`,{name,roomId,assignedTo,...f});
  else await POST('/api/tasks',{name,roomId,assignedTo,...f});
  closeModal(); await loadData();
}
async function deleteTask(id){
  await DEL(`/api/tasks/${id}`);
  await loadData();
}
function showEditTask(id){
  const task = state.data.tasks.find(t=>t.id===id);
  if(task) showAddTask('', task.diff, task);
}
function canCompleteTask(task){
  if(state.user?.role==='admin') return true;
  if(!task.assigned_to) return true;
  return task.assigned_to === state.user?.member_id;
}
function handleCheck(taskId, el){
  const task = state.data.tasks.find(t=>t.id===taskId);
  if(task && !canCompleteTask(task)) return;
  el.innerHTML='<span style="color:#fff;font-size:14px">✓</span>';
  el.classList.add('done');
  completeTask(taskId, el);
}

          <span style="font-weight:800;font-size:16px">${esc(m.name)}</span>
          ${m.streak>0?`<span style="font-size:13px;color:var(--orange)">🔥 ${m.streak}</span>`:''}
        </div>
        <div style="font-size:11px;color:var(--muted2);margin-bottom:7px">
          <span class="level-pill">${LV_ICONS[lv]} ${LV_NAMES[lv]} · ${t('lb_level')} ${lv}</span>

function openMemberDetail(memberId){
  const d = state.data;
  const m = d.members.find(x=>x.id===memberId);
  if(!m) return;
  state._profileMemberId = memberId;

  // Switch to profile screen
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b=>b.classList.remove('active'));
  $('screen-profile').classList.add('active');

  const lv  = getLevel(m.points);
  const prog = lvProg(m.points);
  const nxt  = nextLvPts(m.points);
  const hist = (d.history||[]).filter(h=>h.member_id===m.id).slice(0,20);
  const isMe = state.user?.member_id === m.id;
  const isAdmin = state.user?.role === 'admin';

  const badges=[];
  if(lv>=1) badges.push(`<span class="badge badge-green">${t('lb_cleaner')}</span>`);
  if(lv>=2) badges.push('<span class="badge">⭐ Pro</span>');
  if(lv>=3) badges.push(`<span class="badge badge-gold">${t('lb_expert')}</span>`);
  if(lv>=5) badges.push('<span class="badge">👑 Mistrz</span>');
  if(lv>=7) badges.push('<span class="badge badge-purple">🏆 Legenda</span>');
  if(m.streak>=3) badges.push(`<span class="badge badge-red">🔥 Seria ${m.streak}</span>`);
  if(m.streak>=7) badges.push('<span class="badge badge-purple">💪 Tyg. seria</span>');
  if(m.points>=100) badges.push('<span class="badge badge-gold">🌟 100 pkt</span>');
  if(m.points>=500) badges.push('<span class="badge badge-gold">💫 500 pkt</span>');

  // Activity heatmap for this member (from cached stats)
  const memberAct = (state.stats?.member_activity||{})[m.id] || {};
  const today = new Date(); today.setHours(0,0,0,0);
  let maxAct = 1;
  for(let i=0;i<28;i++){
    const d2=new Date(today); d2.setDate(d2.getDate()-i);
    maxAct = Math.max(maxAct, memberAct[d2.toISOString().slice(0,10)]||0);
  }
  let hmCells='';
  for(let i=27;i>=0;i--){
    const d2=new Date(today); d2.setDate(d2.getDate()-i);
    const key=d2.toISOString().slice(0,10);
    const cnt=memberAct[key]||0;
    const alpha=cnt===0?0:Math.max(0.15,cnt/maxAct);
    hmCells+=`<div style="aspect-ratio:1;border-radius:2px;background:${cnt===0?'var(--bg3)':`rgba(109,123,230,${alpha})`}" title="${key}: ${cnt}"></div>`;
  }

  const histHtml = hist.length===0
    ? `<div style="color:var(--muted2);font-size:13px;text-align:center;padding:20px 0">Brak historii</div>`
    : hist.map(h=>{
        const task=d.tasks.find(t=>t.id===h.task_id);
        const icon = h.type==='missed'?'💀':'✅';
        const clr  = h.type==='missed'?'var(--red)':'var(--green)';
        return `<div class="hist-row">
          <span style="font-size:20px">${icon}</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700">${esc(task?.name||'Usunięte zadanie')}</div>
            <div style="font-size:11px;color:var(--muted2)">${fmtDt(h.completed_at)}</div>
          </div>
          <span style="color:${clr};font-weight:700;font-size:13px">${h.pts>0?'+'+h.pts+' pkt':h.type==='missed'?'Przepadło':''}</span>
        </div>`;
      }).join('');

  $('screen-profile').innerHTML = `
  <div class="topbar">
    <div class="topbar-left">
      <button onclick="setTab('lb')" style="background:none;border:none;color:var(--blue2);font-size:22px;cursor:pointer;padding:0 8px 0 0">‹</button>
      <h1>Profil</h1>
    </div>
  </div>

  <!-- HERO -->
  <div style="background:linear-gradient(135deg,var(--bluedark),var(--blue2));padding:28px 20px 24px;text-align:center;margin-bottom:0">
    <div style="font-size:72px;margin-bottom:10px">${m.emoji}</div>
    <div style="font-size:24px;font-weight:900;color:#fff">${esc(m.name)}</div>
    <div style="margin-top:8px"><span class="level-pill" style="font-size:13px;background:rgba(255,255,255,0.15);color:#fff">${LV_ICONS[lv]} ${LV_NAMES[lv]} · ${t('prof_level')} ${lv}</span></div>
    <div style="display:flex;justify-content:center;gap:28px;margin-top:18px">
      <div><div style="font-size:26px;font-weight:900;color:#fff">${m.points}</div><div style="font-size:10px;color:rgba(255,255,255,0.7);text-transform:uppercase;font-weight:700">${t('prof_points')}</div></div>
      <div><div style="font-size:26px;font-weight:900;color:#fff">🪙 ${m.coins}</div><div style="font-size:10px;color:rgba(255,255,255,0.7);text-transform:uppercase;font-weight:700">${t('prof_coins')}</div></div>
      <div><div style="font-size:26px;font-weight:900;color:#fff">🔥 ${m.streak}</div><div style="font-size:10px;color:rgba(255,255,255,0.7);text-transform:uppercase;font-weight:700">${t('prof_streak')}</div></div>
    </div>
  </div>

  <!-- XP BAR -->
  <div style="padding:14px 20px;background:var(--bg2);border-bottom:1px solid var(--border)">
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted2);margin-bottom:6px">
      <span>Postęp do poziomu ${lv+1}</span>
      <span>${nxt ? nxt-m.points+' pkt' : '🏆 MAX'}</span>
    </div>
    <div class="pbar-track" style="height:10px">
      <div class="pbar-fill" style="width:${prog}%;height:10px;background:linear-gradient(90deg,var(--bluedark),var(--blue2));border-radius:100px"></div>
    </div>
  </div>

  <!-- BADGES -->
  ${badges.length ? `
  <div style="padding:16px 20px 8px">
    <div style="font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px">Odznaki</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">${badges.join('')}</div>
  </div>` : ''}

  <!-- ACTIVITY HEATMAP -->
  <div style="padding:16px 20px 12px">
    <div style="font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px">Aktywność (28 dni)</div>
    <div style="display:grid;grid-template-columns:repeat(28,1fr);gap:2px">${hmCells}</div>
  </div>

  <!-- HISTORY -->
  <div style="padding:4px 20px 0">
    <div style="font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:10px">Historia zadań</div>
  </div>
  ${histHtml}

  ${isAdmin ? `
  <div style="padding:20px">
    <button class="btn btn-danger btn-sm" style="width:100%;justify-content:center"
      onclick="if(confirm('Usunąć ${esc(m.name)}?'))deleteMember('${m.id}')">
      🗑️ Usuń domownika
    </button>
  </div>` : ''}
  <div style="height:80px"></div>`;
}

function renderGoals(){
  const d = state.data;
  if(!d){ $('screen-goals').innerHTML=''; return; }

  const isOwner = state.user?.role === 'admin';
  const myMemberId = state.user?.member_id;
  const goals = d.goals || [];
  const members = d.members || [];

  // Count pending (bought but not fulfilled) for badge
  const pendingCount = goals.reduce((a,g)=>(a + (g.purchases||[]).filter(p=>!p.fulfilled).length),0);
  const badge = $('goals-badge');
  if(badge){ badge.style.display = isOwner && pendingCount > 0 ? 'flex' : 'none'; badge.textContent = pendingCount; }

  // My member coins
  const myMember = members.find(m => m.id === myMemberId);

  let html = `
  <div class="topbar">
    <div class="topbar-left">
      <h1>🎯 ${t('goals_title')}</h1>
      <span>${t('goals_subtitle')}</span>
    </div>
    ${isOwner ? `<div class="topbar-right">
      <div style="display:flex;align-items:center;gap:4px;background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.3);border-radius:100px;padding:4px 10px;font-size:11px;font-weight:800;color:#C084FC">
        👑 ${t('lb_owner')}
      </div>
      <button class="add-btn" onclick="showAddGoal()">+</button>
    </div>` : ''}
  </div>`;

  // Coin balance for current member
  if(myMember){
    html += `
    <div style="margin:0 16px 16px;background:linear-gradient(135deg,#1e1065,#4c1d95);border-radius:18px;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(168,85,247,0.3)">
      <div>
        <div style="font-size:12px;color:rgba(255,255,255,0.6);font-weight:700;text-transform:uppercase;letter-spacing:0.5px">${t('goals_my_coins')}</div>
        <div style="font-size:32px;font-weight:900;color:#FDE68A;margin-top:2px">🪙 ${myMember.coins}</div>
      </div>
      <div style="font-size:48px">${myMember.emoji}</div>
    </div>`;
  }

  // Owner: pending purchases notification
  const allPending = goals.flatMap(g=>(g.purchases||[]).filter(p=>!p.fulfilled).map(p=>({...p, goal:g})));
  if(isOwner && allPending.length > 0){
    html += `
    <div style="margin:0 16px 16px;background:rgba(234,179,8,0.08);border:1px solid rgba(234,179,8,0.3);border-radius:16px;padding:14px 16px">
      <div style="font-size:13px;font-weight:800;color:var(--yellow);margin-bottom:10px">🔔 ${t('goals_pending_list')} (${allPending.length})</div>`;
    allPending.forEach(p => {
      const dt = new Date(p.purchased_at).toLocaleDateString(_lang==='en'?'en-GB':_lang==='uk'?'uk-UA':'pl-PL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
      html += `
      <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(234,179,8,0.15)">
        <span style="font-size:24px">${p.goal.emoji}</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:700">${esc(p.goal.name)}</div>
          <div style="font-size:11px;color:var(--muted2)">${p.member_emoji} ${esc(p.member_name)} · ${dt}</div>
          <div style="font-size:11px;font-weight:700;color:var(--yellow);margin-top:2px">${t('goals_to_approve')}</div>
        </div>
        <button class="btn btn-success btn-xs" onclick="fulfillPurchase('${p.id}')">✓ ${t('goals_fulfill')}</button>
      </div>`;
    });
    html += `</div>`;
  }

  // Goals list
  if(goals.length === 0){
    html += `<div class="empty"><div class="ico">🎯</div><p>${isOwner ? t('goals_add_first') : t('goals_no_member')}</p></div>`;
  } else {
    html += `<div class="shdr"><h2>🏆 ${t('goals_available')}</h2><span>${goals.length}</span></div>`;
    goals.forEach(g => {
      const myCoins = myMember?.coins || 0;
      const canAfford = myCoins >= g.price;
      const myPurchases = (g.purchases||[]).filter(p => p.member_id === myMemberId);
      const hasBought = myPurchases.length > 0 && !myPurchases[myPurchases.length-1].fulfilled;
      const totalBuyers = (g.purchases||[]).length;
      const pct = Math.min(100, Math.round((myCoins / g.price) * 100));

        </div>

        ${hasBought
          ? `<div style="background:rgba(168,85,247,0.1);border:1px solid rgba(168,85,247,0.3);border-radius:12px;padding:8px 12px;text-align:center">
              <div style="font-size:12px;color:#C084FC;font-weight:700">${t('goals_waiting')}</div>
              <div style="font-size:11px;color:#C084FC;font-weight:600;margin-top:2px;opacity:0.85">${t('goals_to_do')}</div>
            </div>`
          : myMemberId
            ? `<button onclick="buyGoal('${g.id}')" ${!canAfford?'disabled':''} style="
                width:100%;padding:12px;border-radius:14px;border:none;cursor:${canAfford?'pointer':'not-allowed'};font-weight:800;font-size:14px;
                background:${canAfford?'linear-gradient(135deg,#5b21b6,#7c3aed)':'var(--fill)'};

            : `<div style="font-size:12px;color:var(--muted2);text-align:center">${t('goals_login_to_buy')}</div>`
        }
      </div>`;
    });
  }

  // Fulfilled purchases history (collapsed) — owner/admin see everyone's,
  // a regular member only sees their own.
  const fulfilled = goals.flatMap(g=>(g.purchases||[]).filter(p=>p.fulfilled && (isOwner || p.member_id === myMemberId)).map(p=>({...p,goal:g})));
  if(fulfilled.length > 0){
    html += `
    <div style="margin:8px 16px 16px">
      <div style="font-size:12px;font-weight:800;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px">✅ ${t('goals_fulfilled_section')} (${fulfilled.length})</div>`;

      </div>`;
    });
    html += `</div>`;
  }

  html += `<div style="height:80px"></div>`;
  $('screen-goals').innerHTML = html;
}

async function buyGoal(goalId){
  const myMemberId = state.user?.member_id;
  if(!myMemberId){ alert('Nie jesteś połączony z profilem domownika'); return; }
  const goal = (state.data.goals||[]).find(g=>g.id===goalId);
  if(!goal) return;
  const myMember = state.data.members.find(m=>m.id===myMemberId);
  openModal(`
    <div style="text-align:center;padding:8px 0 16px">
      <div style="font-size:56px;margin-bottom:12px">${goal.emoji}</div>
      <h2 style="margin-bottom:6px">${esc(goal.name)}</h2>
      ${goal.description?`<div style="font-size:13px;color:var(--muted2);margin-bottom:16px">${esc(goal.description)}</div>`:''}
      <div style="font-size:15px;color:var(--muted2);margin-bottom:20px">
        Kupić za <strong style="color:#FDE68A;font-size:20px">🪙 ${goal.price}</strong>?
      </div>
      <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;font-size:13px;color:var(--muted2)">
        <span>Pozostanie: <strong style="color:#FDE68A">🪙 ${(myMember?.coins||0)-goal.price}</strong></span>
      </div>
      <div style="font-size:12px;color:var(--muted2);background:rgba(168,85,247,0.08);border-radius:12px;padding:10px;margin-bottom:20px;line-height:1.5">
        🔔 Właściciel zostanie powiadomiony i musi to zrealizować w prawdziwym życiu!

async function confirmBuyGoal(goalId){
  const r = await POST(`/api/goals/${goalId}/buy`, {memberId: state.user?.member_id});
  closeModal();
  if(r.error){ alert(r.error); return; }
  await loadData();
  renderGoals();
  showFloat(window.innerWidth/2-60, window.innerHeight/2, '🎯 Zakupiono!');
}
async function fulfillPurchase(pid){
  await POST(`/api/goal-purchases/${pid}/fulfill`, {});
  await loadData();
  renderGoals();
}
async function deleteGoal(gid){
  if(!confirm('Usunąć ten cel?')) return;
  await DEL(`/api/goals/${gid}`);
  await loadData();
  renderGoals();
}

function useGoalTemplate(t){

  if($('goal-price')) $('goal-price').value = t.price;
  // highlight emoji
  document.querySelectorAll('#goal-emoji-grid button').forEach(b=>{
    b.style.borderColor='var(--border)'; b.style.background='var(--fill)';
    if(b.textContent.trim()===t.emoji){ b.style.borderColor='var(--purple)'; b.style.background='rgba(168,85,247,0.15)'; }
  });

async function submitAddGoal(){
  const emoji = $('goal-emoji-custom')?.value.trim() || window._selectedGoalEmoji || '🎯';
  const name  = $('goal-name')?.value.trim();
  const desc  = $('goal-desc')?.value.trim();
  const price = parseInt($('goal-price')?.value)||0;
  if(!name||price<1){ alert(t('modal_goal_err')); return; }
  const r = await POST('/api/goals', {name, description:desc, emoji, price});
  if(r.error){ alert(r.error); return; }
  closeModal();
  await loadData();
  renderGoals();
}

function renderBadges(){
  const d = state.data;
  if(!d){ $('screen-badges').innerHTML='<div class="empty"><div class="ico">🏅</div><p>Brak danych</p></div>'; return; }

  // Collect all earned badges per key across all members
  const earnedByKey = {}; // key → [{member, earned_at}]
  for(const m of d.members){
    for(const ach of (m.achievements||[])){
      if(!earnedByKey[ach.key]) earnedByKey[ach.key]=[];
      earnedByKey[ach.key].push({member:m, earned_at:ach.earned_at});
    }
  }

  const totalAll = Object.keys(BADGES_DEF).length;
  const totalEarned = Object.keys(earnedByKey).length;
  const pct = Math.round((totalEarned/totalAll)*100);

  let html = `
  <div class="topbar">
    <div class="topbar-left"><h1>🏅 ${t('badges_title')}</h1></div>
  </div>

  <!-- Progress bar overall -->
  <div style="margin:0 16px 20px">
    <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px">
      <div style="font-weight:800;font-size:16px">${t('badges_earned_title')}</div>
      <div style="font-size:20px;font-weight:900;color:var(--yellow)">${totalEarned} / ${totalAll}</div>
    </div>
    <div class="pbar-track" style="height:10px">
      <div class="pbar-fill" style="height:10px;width:${pct}%;background:linear-gradient(90deg,var(--yellow),var(--amber))"></div>
    </div>
    <div style="font-size:11px;color:var(--muted2);margin-top:5px">${pct}% ${t('badges_pct')}</div>
  </div>`;

  // Member filter chips
  html += `
  <div style="padding:0 16px;margin-bottom:18px;display:flex;gap:8px;overflow-x:auto;padding-bottom:4px">
    <button class="chip on" onclick="badgeFilterMember(null,this)" id="badge-chip-all">${t('badges_all_filter')}</button>
    ${d.members.map(m=>`
      <button class="chip" onclick="badgeFilterMember('${m.id}',this)" id="badge-chip-${m.id}"
        style="white-space:nowrap">${m.emoji} ${esc(m.name)}</button>`).join('')}
  </div>`;

  // Categories + badge grid
  for(const cat of BADGE_CATEGORIES){
    html += `
    <div style="padding:0 16px;margin-bottom:6px">
      <div style="font-size:12px;font-weight:800;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:12px">${t(cat.label)}</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">`;

    for(const key of cat.keys){
      const def = BADGES_DEF[key];
      const earned = earnedByKey[key] || [];
      const isEarned = earned.length > 0;
      const firstEarned = earned[0];
      const earnedDate = firstEarned ? new Date(firstEarned.earned_at).toLocaleDateString(_lang==='en'?'en-GB':_lang==='uk'?'uk-UA':'pl-PL') : null;
      const earnerNames = earned.map(e=>e.member.emoji+' '+e.member.name).join(', ');

      html += `
        <div class="badge-tile ${isEarned?'earned':'locked'}" data-key="${key}" style="
          background:${isEarned?`rgba(${hexToRgb(def.color)},0.1)`:'var(--fill0)'};
          border:2px solid ${isEarned?def.color+'55':'var(--border)'};
          border-radius:18px;padding:16px 14px;
          opacity:${isEarned?1:0.45};
          position:relative;overflow:hidden;transition:all 0.2s;
          ${isEarned?`box-shadow:0 0 20px ${def.color}22`:''};
        ">
          ${isEarned?`<div style="position:absolute;top:8px;right:8px;font-size:10px;opacity:0.6">✓</div>`
                    :`<div style="position:absolute;top:8px;right:8px;font-size:14px;opacity:0.4">🔒</div>`}
          <div style="font-size:40px;margin-bottom:8px;filter:${isEarned?'none':'grayscale(1)'}">${def.emoji}</div>
          <div style="font-size:13px;font-weight:800;color:${isEarned?'var(--text)':'var(--muted2)'};margin-bottom:4px;line-height:1.2">${t('badge_'+key+'_name')||def.name}</div>
          <div style="font-size:11px;color:var(--muted2);line-height:1.4;margin-bottom:${isEarned?6:0}px">${t('badge_'+key+'_desc')||def.desc}</div>
          ${isEarned?`
          <div style="font-size:10px;color:${def.color};font-weight:700;margin-top:4px">${earnerNames}</div>
          <div style="font-size:10px;color:var(--muted2);margin-top:2px">📅 ${earnedDate}</div>
          `:''}
        </div>`;
    }
    html += `</div></div>`;
  }

  html += `<div style="height:24px"></div>`;
  $('screen-badges').innerHTML = html;
  window._badgeFilter = null;
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function badgeFilterMember(memberId, btn){
  window._badgeFilter = memberId;
  document.querySelectorAll('[id^="badge-chip-"]').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');

  const d = state.data;
  // Rebuild earned map for this member
  const earnedByKey = {};
  const members = memberId ? d.members.filter(m=>m.id===memberId) : d.members;
  for(const m of members){
    for(const ach of (m.achievements||[])){
      if(!earnedByKey[ach.key]) earnedByKey[ach.key]=[];
      earnedByKey[ach.key].push({member:m, earned_at:ach.earned_at});
    }
  }

  // Update tiles
  document.querySelectorAll('.badge-tile').forEach(tile=>{
    const key = tile.dataset.key;
    if(!key) return;
    const def = BADGES_DEF[key];
    const earned = earnedByKey[key]||[];
    const isEarned = earned.length>0;
    tile.style.opacity = isEarned?1:0.45;
    tile.style.background = isEarned?`rgba(${hexToRgb(def.color)},0.1)`:'var(--fill0)';
    tile.style.borderColor = isEarned?def.color+'55':'var(--border)';
    tile.style.boxShadow = isEarned?`0 0 20px ${def.color}22`:'none';
  });
}

// ─── AI VOICE ─────────────────────────────────────────────────
let recognition = null;
let voiceLang = 'pl-PL';
let isRecording = false;

function openVoice() {
  const p = document.getElementById('voice-panel');
  p.style.display = 'block';
  if (!p.dataset.placed) {
    const w = Math.min(400, window.innerWidth - 32);
    p.style.width = w + 'px';
    p.style.left = Math.max(12, Math.round((window.innerWidth - w) / 2)) + 'px';
    p.style.top  = Math.max(12, Math.round(window.innerHeight * 0.16)) + 'px';
    p.dataset.placed = '1';
  }
  const i = document.getElementById('voice-text');
  if (i) setTimeout(()=>i.focus(), 50);
}
// Make the assistant window draggable by its header.
(function(){
  function init(){
    const p = document.getElementById('voice-panel');
    const h = document.getElementById('voice-head');
    if (!p || !h) return;
    let drag = false, ox = 0, oy = 0;
    const start = (cx, cy) => { const r = p.getBoundingClientRect(); ox = cx - r.left; oy = cy - r.top; drag = true; };
    const move  = (cx, cy) => {
      if (!drag) return;
      let x = Math.max(0, Math.min(cx - ox, window.innerWidth  - p.offsetWidth));
      let y = Math.max(0, Math.min(cy - oy, window.innerHeight - p.offsetHeight));
      p.style.left = x + 'px'; p.style.top = y + 'px';
    };
    h.addEventListener('mousedown', e => { if (e.target.closest('button')) return; start(e.clientX, e.clientY); e.preventDefault(); });
    window.addEventListener('mousemove', e => move(e.clientX, e.clientY));
    window.addEventListener('mouseup', () => drag = false);
    h.addEventListener('touchstart', e => { if (e.target.closest('button')) return; const t = e.touches[0]; start(t.clientX, t.clientY); }, {passive:true});
    window.addEventListener('touchmove', e => { if (drag) { const t = e.touches[0]; move(t.clientX, t.clientY); } }, {passive:true});
    window.addEventListener('touchend', () => drag = false);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init); else init();
})();
function closeVoice() {
  document.getElementById('voice-panel').style.display = 'none';
  if (isRecording) stopRecording();
}
function setVoiceLang(lang, btn) {
  voiceLang = lang;
  document.querySelectorAll('#lang-chips .chip').forEach(c => c.classList.remove('on'));
  btn.classList.add('on');
  if (recognition) { recognition.lang = lang; }
}
function useExample(text) {
  const t = document.getElementById('voice-transcript');
  t.textContent = text;
  t.style.display = 'block';
  document.getElementById('voice-send').style.display = 'block';
}

function toggleRecording() {
  isRecording ? stopRecording() : startRecording();
}

function startRecording() {
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SpeechRecognition) {
    alert('Twoja przeglądarka nie obsługuje rozpoznawania mowy. Użyj Chrome.');
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = voiceLang;
  recognition.continuous = false;
  recognition.interimResults = true;
  let gotResult = false;
  const noSpeechMsg = voiceLang.startsWith('pl') ? 'Nie wykryto mowy — sprawdź mikrofon'
                    : voiceLang.startsWith('uk') ? 'Мовлення не виявлено — перевірте мікрофон'
                    : 'No speech detected — check your microphone';

  recognition.onstart = () => {
    isRecording = true;
    const btn = document.getElementById('mic-btn');
    btn.style.background = 'linear-gradient(135deg,#ef4444,#dc2626)';
    btn.textContent = '⏹️';
    document.getElementById('rec-status').textContent = 'Słucham...';
  };
  recognition.onresult = (e) => {
    let transcript = '';
    for (let i = 0; i < e.results.length; i++) transcript += e.results[i][0].transcript;
    if (transcript.trim()) gotResult = true;
    const t = document.getElementById('voice-transcript');
    t.textContent = transcript;
    t.style.display = 'block';
    document.getElementById('voice-send').style.display = 'block';
  };
  recognition.onerror = (e) => {
    const st = document.getElementById('rec-status');
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
      st.textContent = voiceLang.startsWith('pl') ? 'Brak dostępu do mikrofonu' : 'Microphone access blocked';
    } else if (e.error === 'no-speech' || e.error === 'audio-capture' || e.error === 'aborted') {
      st.textContent = noSpeechMsg;
    } else {
      st.textContent = 'Błąd: ' + e.error;
    }
    stopRecording();
  };
  recognition.onend = () => {
    stopRecording();
    if (!gotResult) {
      const st = document.getElementById('rec-status');
      if (st && !st.textContent.includes('Brak dostępu') && !st.textContent.includes('blocked'))
        st.textContent = noSpeechMsg;
    }
  };
  recognition.start();
}

function stopRecording() {
  isRecording = false;
  if (recognition) { try { recognition.stop(); } catch(e){} recognition = null; }
  const btn = document.getElementById('mic-btn');
  if (btn) {
    btn.style.background = 'linear-gradient(135deg,#0EA5E9,#0284C7)';
    btn.textContent = '🎤';
  }
  const st = document.getElementById('rec-status');
  if (st) st.textContent = 'Naciśnij i mów';
}

function onVoiceText(v){
  document.getElementById('voice-transcript').textContent = v;
  document.getElementById('voice-send').style.display = v.trim() ? 'block' : 'none';
}

async function sendVoiceCommand() {
  const tEl = document.getElementById('voice-transcript');
  const vt = document.getElementById('voice-text');
  const transcript = (tEl.textContent || (vt && vt.value) || '').trim();
  if (!transcript) { alert('Najpierw nagraj lub wpisz komendę!'); return; }
  const statusEl = document.getElementById('rec-status');
  const resultEl = document.getElementById('voice-result');
  statusEl.textContent = '🤖 Analizuję...';
  resultEl.style.display = 'none';
  try {
    const res = await fetch('/api/voice', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({transcript, lang: voiceLang})
    });
    const data = await res.json();
    if (data.error) {
      statusEl.textContent = 'Naciśnij i mów';
      resultEl.style.display = 'block';
      resultEl.innerHTML = `<div style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);border-radius:12px;padding:12px;color:var(--red);font-size:13px">❌ ${data.error}</div>`;
    } else {
      statusEl.textContent = 'Naciśnij i mów';
      resultEl.style.display = 'block';
      resultEl.innerHTML = `<div style="background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:12px;padding:12px;color:#86efac;font-size:13px">✅ ${data.message || 'Gotowe!'}</div>`;
      tEl.textContent = '';
      tEl.style.display = 'none';
      if (vt) vt.value = '';
      document.getElementById('voice-send').style.display = 'none';
      await loadData();
      if(data.new_badges && data.new_badges.length > 0) showBadgeToast(data.new_badges);
    }
  } catch(e) {
    statusEl.textContent = 'Naciśnij i mów';
    resultEl.style.display = 'block';
    resultEl.innerHTML = `<div style="background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.4);border-radius:12px;padding:12px;color:var(--red);font-size:13px">❌ Błąd połączenia z serwerem</div>`;
  }
}

    streak_7:{name:'Seria 7 dni',emoji:'🔥🔥'},streak_30:{name:'Niezniszczalny',emoji:'💎'},
    tasks_10:{name:'Pracowity',emoji:'⚡'},tasks_50:{name:'Superbohater',emoji:'🦸'},
    tasks_100:{name:'Legenda',emoji:'👑'},daily_5:{name:'Błyskawica',emoji:'⚡'},
    perfect_room:{name:'Perfekcjonista',emoji:'✨'},week_champ:{name:'Sprzątacz Tygodnia',emoji:'🏆'},
    month_champ:{name:'Mistrz Miesiąca',emoji:'🥇'},hard_worker:{name:'Twardziel',emoji:'💪'},
    early_bird:{name:'Ranny Ptaszek',emoji:'🐦'},night_owl:{name:'Nocna Sowa',emoji:'🦉'},
  };

    const b = BADGE_DEFS[key]; if(!b) return;

    toast.style.cssText = `position:fixed;top:${80+i*70}px;left:50%;transform:translateX(-50%);
      background:linear-gradient(135deg,#6366F1,#8B5CF6);color:#fff;padding:12px 20px;
      border-radius:16px;font-size:14px;font-weight:700;z-index:9999;
      box-shadow:0 8px 32px rgba(99,102,241,0.5);animation:slideDown 0.4s ease;
      display:flex;align-items:center;gap:10px;white-space:nowrap`;
    toast.innerHTML = `<span style="font-size:24px">${b.emoji}</span><div>
      <div style="font-size:11px;opacity:0.8">Nowa odznaka!</div>
      <div>${b.name}</div></div>`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
  });
}
