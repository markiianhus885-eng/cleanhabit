<style>
/* ═══════════════════════════════════════════════
   DESIGN SYSTEM – inspired by Sweepy's blue/dark UI
═══════════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}

:root {
  /* Playful gamified palette — LIGHT (default), matches Flutter app */
  --bg:     #F4F2FC;   /* page background lavender */
  --bg2:    #FFFFFF;   /* nav / sheets / secondary surfaces */
  --bg3:    #EFEBFA;   /* subtle inset (segmented, stat insets) */
  --card:   #FFFFFF;
  --card2:  #F6F3FE;
  --border: #E7E2F4;

  --blue:   #5563D8;   /* primary accent (kept name to drive existing rules) */
  --blue2:  #5159D6;   /* accent text on light surfaces — readable */
  --blue3:  #6354C4;
  --bluedark:#4750C8;
  --indigo: #5563D8;

  --green:  #2F8B5E;
  --teal:   #2FB8A6;
  --yellow: #C98A00;   /* xp gold — readable on light */
  --amber:  #E5A623;   /* coins gold */
  --orange: #FF7A3D;   /* streak flame */
  --red:    #E5557A;
  --pink:   #E5557A;
  --purple: #6354C4;

  --text:   #2B2840;
  --text2:  #6F6890;
  --muted:  #B0AAC8;
  --muted2: #908AA8;

  /* theme-aware overlay fills (replace hardcoded white rgba) */
  --fill0:  rgba(85,89,214,0.035);
  --fill:   rgba(85,89,214,0.05);
  --fill2:  rgba(85,89,214,0.07);
  --fill3:  rgba(85,89,214,0.09);
  --track:  #E6E1F4;
  --card-shadow: 0 14px 30px -18px rgba(60,45,120,0.45);
  --nav-shadow: 0 -10px 30px -16px rgba(60,45,120,0.18);

  --navh:   72px;
  --r-card: 22px;
  --r-sm:   14px;
  --shadow: 0 18px 40px -22px rgba(60,45,120,0.40);
}

html.dark {
  /* Playful dark variant */
  --bg:#191527; --bg2:#241D33; --bg3:#2A2240; --card:#241D33; --card2:#2A2240; --border:#352B4D;
  --blue:#6D7BE6; --blue2:#8E97F2; --blue3:#B9AEF5; --bluedark:#5159D6; --indigo:#8E97F2;
  --green:#2FB877; --teal:#2FB8A6; --yellow:#FFD86B; --amber:#FFC53D; --orange:#FF7A3D; --red:#F0617A; --pink:#F08AAB; --purple:#B9AEF5;
  --text:#ECE8FA; --text2:#B9B2D6; --muted:#6F6890; --muted2:#8A82AA;
  --fill0:rgba(255,255,255,.02); --fill:rgba(255,255,255,.03); --fill2:rgba(255,255,255,.05); --fill3:rgba(255,255,255,.07);
  --track:rgba(255,255,255,.08);
  --card-shadow:none; --nav-shadow:none;
  --shadow:0 18px 44px rgba(10,6,28,0.6);
}

html,body{height:100%;overflow:hidden;}
html{background:var(--bg);}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  width:100%;
  margin:0;
  position:relative;
  overflow:hidden;
}

/* ──────────────── SCROLLBAR ──────────────── */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--blue);border-radius:2px;}

/* ──────────────── SCREENS ──────────────── */
.screen{
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--navh) + 16px);
  display:none;
}
.screen.active{display:block;}

/* ──────────────── TOPBAR ──────────────── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:20px 20px 12px;
  position:sticky;top:0;z-index:50;
  background:linear-gradient(180deg,var(--bg) 70%,transparent);
}
.topbar-left h1{font-size:26px;font-weight:800;letter-spacing:-0.5px;line-height:1;}
.topbar-left span{font-size:13px;color:var(--text2);opacity:0.7;display:block;margin-top:2px;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.add-btn{width:42px;height:42px;border-radius:14px;border:none;
  background:linear-gradient(135deg,var(--blue2),var(--bluedark));
  color:#fff;font-size:26px;font-weight:500;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 8px 18px -6px rgba(109,123,230,0.6);transition:transform 0.15s;}
.add-btn:active{transform:scale(0.9);}

/* ──────────────── BOTTOM NAV ──────────────── */
.bnav{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  width:calc(100% - 24px);max-width:406px;height:var(--navh);
  background:var(--bg2);
  border:1px solid var(--border);border-radius:24px;
  display:flex;z-index:200;
  backdrop-filter:blur(20px);
  box-shadow:0 16px 36px -14px rgba(60,45,120,0.45);
}
html.dark .bnav{box-shadow:0 16px 36px -10px rgba(0,0,0,0.55);}
.bnav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;border:none;background:none;cursor:pointer;
  color:var(--muted2);font-size:10px;font-weight:600;letter-spacing:0.2px;
  padding:6px 2px;transition:color 0.2s;
}
.bnav-btn.active{color:var(--blue2);}
.bnav-icon{
  width:38px;height:30px;display:flex;align-items:center;justify-content:center;
  border-radius:14px;font-size:20px;transition:all 0.2s;position:relative;
}
.bnav-btn.active .bnav-icon{background:rgba(109,123,230,0.15);}
.nav-badge{
  position:absolute;top:-2px;right:-2px;
  width:16px;height:16px;background:var(--red);border-radius:50%;
  font-size:9px;display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;border:2px solid var(--bg2);
}

/* ──────────────── CARDS ──────────────── */
.card{background:var(--card);border-radius:var(--r-card);border:1px solid var(--border);padding:18px;box-shadow:var(--card-shadow);}
.card-sm{background:var(--card);border-radius:var(--r-sm);border:1px solid var(--border);padding:12px;box-shadow:var(--card-shadow);}

/* ──────────────── PROGRESS BAR ──────────────── */
.pbar-track{background:var(--track);border-radius:100px;overflow:hidden;}
.pbar-fill{border-radius:100px;transition:width 0.7s cubic-bezier(.4,0,.2,1);}

/* ──────────────── BUTTONS ──────────────── */
.btn{
  border:none;border-radius:14px;padding:12px 22px;
  font-size:14px;font-weight:700;cursor:pointer;
  display:inline-flex;align-items:center;gap:7px;
  transition:all 0.15s;letter-spacing:0.1px;
}
.btn:active{transform:scale(0.96);}
.btn-primary{
  background:linear-gradient(135deg,var(--bluedark),var(--blue));
  color:#fff;box-shadow:0 4px 18px rgba(109,123,230,0.3);
}
.btn-ghost{background:var(--fill2);color:var(--text2);border:1px solid var(--border);}
.btn-success{background:rgba(34,197,94,0.15);color:var(--green);border:1px solid rgba(34,197,94,0.25);}
.btn-danger{background:rgba(239,68,68,0.12);color:var(--red);border:1px solid rgba(239,68,68,0.2);}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:10px;}
.btn-xs{padding:5px 10px;font-size:11px;border-radius:8px;}
.btn-icon{
  width:40px;height:40px;border-radius:12px;
  background:var(--fill2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:18px;transition:all 0.15s;
}

/* ──────────────── FAB ──────────────── */
.fab{
  position:fixed;bottom:calc(var(--navh)+18px);right:18px;
  width:56px;height:56px;border-radius:50%;
  background:linear-gradient(135deg,var(--bluedark),var(--blue2));
  border:none;color:#fff;font-size:28px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 28px rgba(109,123,230,0.5);z-index:100;
  transition:transform 0.15s;
}
.fab:active{transform:scale(0.88);}

/* ──────────────── MODAL ──────────────── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.75);
  z-index:1000;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;transition:opacity 0.25s;pointer-events:none;
}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-sheet{
  background:var(--bg2);border-radius:28px 28px 0 0;
  padding:0 20px 40px;width:100%;max-width:430px;
  max-height:92vh;overflow-y:auto;
  border:1px solid var(--border);border-bottom:none;
  transform:translateY(100%);transition:transform 0.3s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.open .modal-sheet{transform:translateY(0);}
.modal-pill{width:44px;height:5px;background:var(--border);border-radius:3px;margin:16px auto 20px;}
.modal-sheet h2{font-size:20px;font-weight:800;margin-bottom:18px;}

/* ──────────────── INPUTS ──────────────── */
.field{margin-bottom:16px;}
.field label{
  display:block;font-size:11px;font-weight:700;color:var(--muted2);
  text-transform:uppercase;letter-spacing:0.8px;margin-bottom:7px;
}
.inp{
  width:100%;background:var(--fill);
  border:1.5px solid var(--border);border-radius:13px;
  padding:12px 15px;color:var(--text);font-size:14px;
  outline:none;transition:border-color 0.2s,background 0.2s;
  appearance:none;
}
.inp:focus{border-color:var(--blue);background:rgba(109,123,230,0.05);}
.inp::placeholder{color:var(--muted2);}

/* ──────────────── CHIPS ──────────────── */
.chips{display:flex;gap:8px;flex-wrap:wrap;}
.chip{
  padding:8px 14px;border-radius:100px;
  border:1.5px solid var(--border);background:transparent;
  color:var(--muted2);font-size:12px;font-weight:600;
  cursor:pointer;transition:all 0.15s;
}
.chip.on{
  background:rgba(109,123,230,0.15);
  border-color:var(--blue);color:var(--blue2);
}
.chip:active{transform:scale(0.95);}

/* ──────────────── TAGS ──────────────── */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700;}
.tag-g{background:rgba(34,197,94,0.12);color:var(--green);}
.tag-y{background:rgba(234,179,8,0.12);color:var(--yellow);}
.tag-o{background:rgba(249,115,22,0.12);color:var(--orange);}
.tag-r{background:rgba(239,68,68,0.12);color:var(--red);}
.tag-b{background:rgba(109,123,230,0.12);color:var(--blue2);}
.tag-p{background:rgba(168,85,247,0.12);color:var(--purple);}

/* ──────────────── SECTION HEADER ──────────────── */
.shdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;}
.shdr h2{font-size:17px;font-weight:800;letter-spacing:-0.01em;}
.shdr span{font-size:12px;color:var(--muted2);}

/* ──────────────── EMOJI GRID ──────────────── */
.egrid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:8px;}
.ebtn{
  aspect-ratio:1;border-radius:11px;
  border:1.5px solid var(--border);
  background:var(--fill);
  font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.ebtn.on{background:rgba(109,123,230,0.15);border-color:var(--blue);}

/* ──────────────── AVATAR ──────────────── */
.ava{display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0;}

/* ──────────────── DIVIDER ──────────────── */
.divider{height:1px;background:var(--border);margin:10px 0;}

/* ──────────────── EMPTY ──────────────── */
.empty{text-align:center;padding:56px 24px;color:var(--muted2);}
.empty .ico{font-size:56px;margin-bottom:16px;}
.empty p{font-size:14px;line-height:1.6;}

/* ──────────────── COINS BADGE ──────────────── */
.coins-badge{
  display:flex;align-items:center;gap:5px;
  background:rgba(234,179,8,0.1);border:1px solid rgba(234,179,8,0.25);
  border-radius:100px;padding:6px 14px;
  font-size:13px;font-weight:700;color:var(--yellow);
}

/* ──────────────── TABS ──────────────── */
.tabs{
  display:flex;background:var(--bg3);border-radius:14px;
  padding:4px;margin:0 16px 12px;
}
.tab-btn{
  flex:1;padding:9px 4px;text-align:center;
  font-size:12px;font-weight:700;border-radius:11px;
  cursor:pointer;transition:all 0.2s;
  color:var(--muted2);border:none;background:none;
}
.tab-btn.on{
  background:var(--blue);color:#fff;
  box-shadow:0 2px 14px rgba(109,123,230,0.4);
}

/* ──────────────── HERO BANNER ──────────────── */
.hero{
  margin:8px 16px 14px;border-radius:22px;padding:22px;
  position:relative;overflow:hidden;
}
.hero-blue{background:linear-gradient(135deg,#3A2E8C 0%,#5159D6 45%,#6D7BE6 100%);}
.hero-teal{background:linear-gradient(135deg,#2A2456 0%,#4D52C4 45%,#7C84F0 100%);}
.hero-amber{background:linear-gradient(135deg,#78350f 0%,#b45309 40%,#f59e0b 100%);}
.hero-red{background:linear-gradient(135deg,#7f1d1d 0%,#b91c1c 40%,#ef4444 100%);}
.hero::before{content:'';position:absolute;top:-50px;right:-50px;width:160px;height:160px;background:rgba(255,255,255,.10);border-radius:50%;}
.hero::after{content:'';position:absolute;bottom:-30px;right:30px;width:100px;height:100px;background:rgba(255,255,255,.08);border-radius:50%;}
.hero-emoji{font-size:38px;margin-bottom:10px;display:block;position:relative;z-index:1;}
.hero h2{font-size:20px;font-weight:800;line-height:1.25;position:relative;z-index:1;}
.hero p{font-size:13px;opacity:0.85;margin-top:6px;line-height:1.5;position:relative;z-index:1;}
.hero-msg{font-size:13px;font-style:italic;color:rgba(255,255,255,0.7);margin-top:8px;position:relative;z-index:1;}

/* ──────────────── STATS GRID ──────────────── */
.stat-row{display:flex;gap:10px;padding:0 16px;margin-bottom:14px;}
.stat-box{flex:1;background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px 10px;text-align:center;box-shadow:var(--card-shadow);}
.stat-val{font-size:24px;font-weight:800;color:var(--blue2);}
.stat-lbl{font-size:10px;color:var(--muted2);margin-top:2px;font-weight:600;letter-spacing:0.3px;}

/* ──────────────── EFFORT CARD ──────────────── */
.effort-card{margin:0 16px 14px;background:var(--card);border-radius:20px;border:1px solid var(--border);padding:18px;box-shadow:var(--card-shadow);}
.effort-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
.effort-num{font-size:28px;font-weight:800;color:var(--blue2);}
.effort-sub{font-size:12px;color:var(--muted2);}
.effort-goal{font-size:14px;font-weight:700;color:var(--text2);}
.effort-pct{font-size:12px;color:var(--muted2);margin-top:2px;}

/* ──────────────── ROOM CARD ──────────────── */
.room-card{
  display:flex;align-items:flex-start;gap:14px;
  padding:16px;background:var(--card);
  border-radius:20px;border:1px solid var(--border);
  margin:0 16px 10px;cursor:pointer;transition:all 0.2s;
  box-shadow:var(--card-shadow);
}
.room-card:active{transform:scale(0.98);}
.room-icon-box{
  width:52px;height:52px;border-radius:15px;
  display:flex;align-items:center;justify-content:center;
  font-size:28px;flex-shrink:0;
}
.room-meta{flex:1;min-width:0;}
.room-name{font-size:16px;font-weight:800;margin-bottom:2px;}
.room-since{font-size:11px;color:var(--muted2);margin-bottom:10px;}
.room-pct-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.room-pct{font-size:15px;font-weight:800;}
.room-lbl{font-size:12px;color:var(--muted2);}

/* ──────────────── TASK ITEM ──────────────── */
.task-item{
  display:flex;align-items:center;gap:13px;
  padding:15px 16px;background:var(--card);
  border-radius:18px;margin:0 16px 9px;
  border:1px solid var(--border);transition:all 0.2s;
  box-shadow:var(--card-shadow);
}
.task-item.done{opacity:0.4;}
.task-chk{
  width:30px;height:30px;border-radius:50%;
  border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.25s;flex-shrink:0;
}
.task-chk.done{background:var(--green);border-color:var(--green);}
.task-chk.due{border-color:var(--orange);}
.task-chk.pending{background:var(--yellow);border-color:var(--yellow);}
.task-name{font-size:14px;font-weight:700;margin-bottom:3px;}
.task-meta{font-size:12px;color:var(--muted2);display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.task-meta .dot{color:var(--muted);}
.pts-pill{
  display:inline-flex;align-items:center;gap:3px;
  background:rgba(109,123,230,0.12);color:var(--blue2);
  padding:4px 9px;border-radius:100px;font-size:12px;font-weight:700;
}
.coin-pill{
  display:inline-flex;align-items:center;gap:3px;
  font-size:11px;color:var(--yellow);font-weight:600;margin-top:2px;
}

/* ──────────────── LEADERBOARD ──────────────── */
.lb-card{
  display:flex;align-items:center;gap:14px;
  padding:16px;background:var(--card);
  border-radius:20px;border:1px solid var(--border);
  margin:0 16px 10px;cursor:pointer;transition:all 0.2s;
  box-shadow:var(--card-shadow);
}
.lb-card:active{transform:scale(0.98);}
.lb-rank{width:34px;text-align:center;font-size:22px;font-weight:800;flex-shrink:0;}
.lb-right{margin-left:auto;text-align:right;flex-shrink:0;}
.lb-pts{font-size:24px;font-weight:800;}
.lb-lbl{font-size:9px;color:var(--muted2);font-weight:700;letter-spacing:0.5px;}
.lb-coins{font-size:12px;color:var(--yellow);margin-top:2px;}

/* ──────────────── VIRTUAL HOME ──────────────── */
.shop-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 16px;}
.shop-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:18px;padding:16px;text-align:center;
  cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;
}
.shop-item:active{transform:scale(0.96);}
.shop-item.owned{border-color:var(--green);}
.shop-item.cant-afford{opacity:0.5;}
.shop-emoji{font-size:40px;margin-bottom:10px;display:block;}
.shop-name{font-size:13px;font-weight:700;margin-bottom:6px;}
.shop-price{display:flex;align-items:center;justify-content:center;gap:4px;font-size:13px;font-weight:700;color:var(--yellow);}
.shop-owned-badge{position:absolute;top:10px;right:10px;font-size:16px;}

/* ──────────────── VIRTUAL HOUSE DISPLAY ──────────────── */
.vhouse{
  background:linear-gradient(180deg,#241D33,#191527);
  border-radius:18px;min-height:160px;padding:16px;
  display:flex;flex-wrap:wrap;gap:12px;
  align-items:flex-end;justify-content:center;
  border:1px solid var(--border);position:relative;overflow:hidden;
}
.vhouse::before{
  content:'🌙';position:absolute;top:12px;right:16px;font-size:20px;opacity:0.6;
}
.vhouse::after{
  content:'⭐ ⭐ ⭐';position:absolute;top:14px;left:16px;font-size:10px;color:rgba(255,255,255,0.3);letter-spacing:4px;
}
.vhouse-item{text-align:center;animation:dropIn 0.4s ease;}
.vhouse-item .vi{font-size:32px;}
.vhouse-item .vn{font-size:9px;color:rgba(255,255,255,0.5);}
.vhouse-empty{color:rgba(255,255,255,0.3);font-size:13px;text-align:center;width:100%;padding:20px 0;}

/* ──────────────── BADGES ──────────────── */
.badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:4px 11px;border-radius:100px;font-size:11px;font-weight:700;
  background:rgba(109,123,230,0.1);border:1px solid rgba(109,123,230,0.2);
  color:var(--blue3);
}
.badge-gold{background:rgba(234,179,8,0.1);border-color:rgba(234,179,8,0.2);color:var(--yellow);}
.badge-green{background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.2);color:var(--green);}
.badge-purple{background:rgba(168,85,247,0.1);border-color:rgba(168,85,247,0.2);color:var(--purple);}
.badge-red{background:rgba(249,115,22,0.1);border-color:rgba(249,115,22,0.2);color:var(--orange);}

/* ──────────────── ANIMATIONS ──────────────── */
@keyframes dropIn{from{transform:scale(0) translateY(-20px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
@keyframes floatUp{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-80px);opacity:0;}}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-20px);opacity:0;}to{transform:translateX(-50%) translateY(0);opacity:1;}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}

.float-pts{
  position:fixed;pointer-events:none;z-index:999;
  font-size:18px;font-weight:800;white-space:nowrap;
  text-shadow:0 2px 10px rgba(0,0,0,0.5);
  animation:floatUp 0.8s ease forwards;
}
.shake{animation:pulse 0.3s ease 2;}

/* ──────────────── HISTORY ITEM ──────────────── */
.hist-row{
  display:flex;align-items:center;gap:12px;
  padding:11px 0;border-bottom:1px solid var(--border);
}
.hist-row:last-child{border-bottom:none;}

/* ──────────────── APPROVAL CARD ──────────────── */
.approval-card{
  margin:0 16px 10px;background:var(--card);
  border-radius:18px;border:1px solid rgba(234,179,8,0.3);
  padding:14px 16px;display:flex;align-items:center;gap:12px;
}

/* ──────────────── SETTINGS ──────────────── */
.settings-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 0;border-bottom:1px solid var(--border);
}
.settings-row:last-child{border-bottom:none;}

/* ──────────────── LEVEL BADGE ──────────────── */
.level-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(99,102,241,0.12);border:1px solid rgba(99,102,241,0.25);
  border-radius:100px;padding:3px 10px;
  font-size:11px;font-weight:700;color:var(--indigo);
}

/* ──────────────── HOME: avatar + level hero (matches Playful mockup) ──────────────── */
.home-ava{width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#6D7BE6,#5563D8);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 8px 18px -6px rgba(85,89,214,.5);}
.lvl-wrap{display:flex;gap:12px;margin:0 16px 16px;}
.lvl-hero{flex:1;position:relative;border-radius:24px;padding:18px 18px 16px;background:linear-gradient(140deg,#6D7BE6,#5159D6);box-shadow:0 18px 34px -16px rgba(85,89,214,.55);overflow:hidden;color:#fff;}
.lvl-hero::after{content:'';position:absolute;top:-30px;right:-20px;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.1);}

.lvl-xp{display:flex;align-items:baseline;gap:5px;margin-top:8px;position:relative;}
.lvl-xp .n{font-size:36px;font-weight:800;letter-spacing:-1px;line-height:1;}
.lvl-xp .u{font-size:14px;font-weight:600;opacity:.85;}
.lvl-next{font-size:11.5px;color:rgba(255,255,255,.78);margin-top:6px;position:relative;}
.lvl-bar{height:7px;border-radius:999px;background:rgba(0,0,0,.18);overflow:hidden;margin-top:9px;position:relative;}
.lvl-bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#FFE08A,#FFC53D);}
.lvl-side{width:92px;display:flex;flex-direction:column;gap:12px;flex-shrink:0;}
.chip-streak,.chip-coins{flex:1;border-radius:20px;padding:12px;display:flex;flex-direction:column;justify-content:center;}
.chip-streak{background:var(--card);border:1px solid var(--border);box-shadow:var(--card-shadow);}
.chip-coins{background:linear-gradient(135deg,#F4CBD8,#EFB9CC);}

.chip-streak .row,.chip-coins .row{display:flex;align-items:center;gap:4px;font-size:18px;font-weight:800;color:var(--text);}
.chip-coins .row{color:#9C3460;}
html.dark .chip-coins .row{color:#fff;}
.chip-streak .lbl{font-size:10.5px;color:var(--muted2);margin-top:3px;}
.chip-coins .lbl{font-size:10.5px;color:#B5557C;margin-top:3px;}

/* cleanliness status — clean card (replaces harsh red banner) */
.clean-card{display:flex;align-items:center;gap:14px;margin:0 16px 14px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:16px;box-shadow:var(--card-shadow);}

.clean-bar i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,#6D7BE6,#5159D6);}

/* ════════════════ DASHBOARD SHELL (web app) ════════════════ */
#app-shell{display:flex;height:100vh;width:100%;overflow:hidden;}
#main{flex:1;min-width:0;display:flex;flex-direction:column;}

.screen{display:none;}

/* ── Sidebar ── */

.side-level .av{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;font-size:20px;flex:none;}
.side-level .nm{font-size:14px;font-weight:800;color:#fff;}
.side-level .lv{font-size:11.5px;font-weight:600;color:rgba(255,255,255,.8);}
.side-level .bar{height:6px;border-radius:999px;background:rgba(255,255,255,.25);overflow:hidden;margin-top:12px;position:relative;}

/* ── Topbar ── */
#topbar{display:flex;height:72px;flex:none;background:var(--bg2);border-bottom:1px solid var(--border);align-items:center;gap:18px;padding:0 28px;}
.tb-search{flex:1;max-width:380px;display:flex;align-items:center;gap:10px;background:var(--bg);border-radius:14px;padding:11px 15px;color:var(--muted2);font-size:14px;font-weight:500;}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.tb-badge{display:inline-flex;align-items:center;gap:7px;font-size:14px;font-weight:800;padding:9px 14px;border-radius:13px;}
.tb-coins{color:#B5811A;background:#FFF1D6;}
.tb-streak{color:#D9663C;background:#FFE9DC;}

html.dark .tb-streak{color:#FF9A6B;background:rgba(255,122,61,.14);}
.tb-ava{width:42px;height:42px;border-radius:13px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex:none;}
.tb-search input{flex:1;min-width:0;border:none;background:transparent;outline:none;font-family:inherit;font-size:14px;font-weight:500;color:var(--text);}
.tb-search input::placeholder{color:var(--muted2);}
#search-results{position:absolute;top:50px;left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:14px;box-shadow:0 20px 44px -18px rgba(60,45,120,.5);padding:6px;display:none;z-index:400;max-height:360px;overflow-y:auto;}
#search-results.open{display:block;}
.sr-item{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:10px;cursor:pointer;}
.sr-item:hover{background:var(--bg);}
.sr-ic{width:30px;height:30px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;background:var(--bg3);flex:none;}
.sr-t{font-size:13.5px;font-weight:700;color:var(--text);}
.sr-s{font-size:11.5px;color:var(--muted2);}
.sr-empty{padding:14px;text-align:center;color:var(--muted2);font-size:13px;}
.fam-list{display:flex;flex-direction:column;gap:12px;}
.fam-row{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px 18px;box-shadow:var(--card-shadow);}
.fam-av{width:48px;height:48px;border-radius:14px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:26px;flex:none;}
.fam-meta{flex:1;min-width:0;}
.fam-name{font-size:15.5px;font-weight:800;color:var(--text);display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.fam-sub{font-size:12.5px;color:var(--muted2);margin-top:2px;}
.fam-badge{font-size:10px;font-weight:800;border-radius:7px;padding:2px 7px;}
.fam-badge.gold{background:rgba(229,166,35,.16);color:#B5811A;}
.fam-badge.indigo{background:rgba(85,99,216,.14);color:#5159D6;}
.fam-actions{display:flex;gap:7px;flex:none;}
.fam-actions button{background:none;border:1px solid var(--border);color:var(--muted2);border-radius:9px;padding:6px 10px;font-size:13px;cursor:pointer;}
.fam-actions button:hover{background:var(--bg);}
.fam-code{background:var(--bg3);border:1.5px dashed var(--border);border-radius:14px;padding:14px;text-align:center;font-size:22px;font-weight:800;letter-spacing:.26em;color:#5563D8;cursor:pointer;}
/* AI assistant — draggable + resizable floating window */
#voice-panel{position:fixed;z-index:300;left:16px;top:80px;width:380px;resize:both;overflow:auto;min-width:300px;min-height:240px;max-width:96vw;max-height:92vh;}

/* ── Dashboard content (matches Web App design) ── */
.page{padding:30px 36px 48px;max-width:1320px;}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:14px;}
.page-h1{font-size:30px;font-weight:800;letter-spacing:-0.02em;margin:0;color:var(--text);}
.page-sub{font-size:14.5px;color:var(--muted2);font-weight:500;margin:6px 0 0;}
.dash-btn{display:inline-flex;align-items:center;gap:9px;font-size:14.5px;font-weight:800;color:#fff;background:linear-gradient(135deg,#6D7BE6,#5159D6);padding:12px 22px;border-radius:14px;box-shadow:0 14px 28px -12px rgba(85,89,214,.6);cursor:pointer;border:none;}
.dash-hero{display:flex;align-items:center;margin-top:24px;border-radius:26px;padding:26px 30px;background:linear-gradient(135deg,#6D7BE6,#5159D6);box-shadow:0 26px 52px -24px rgba(85,89,214,.6);position:relative;overflow:hidden;flex-wrap:wrap;gap:18px;}
.dash-hero::before{content:'';position:absolute;top:-50px;right:-30px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.1);}
.dash-hero-main{flex:1;min-width:220px;position:relative;}
.dh-cap{font-size:12.5px;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.78);}
.dh-big{font-size:38px;font-weight:800;color:#fff;line-height:1;margin-top:8px;letter-spacing:-0.02em;}
.dh-big span{font-size:20px;font-weight:700;color:rgba(255,255,255,.7);}
.dh-bar{height:9px;border-radius:999px;background:rgba(255,255,255,.25);overflow:hidden;margin-top:14px;max-width:340px;}

.dh-note{font-size:12.5px;font-weight:600;color:rgba(255,255,255,.82);margin-top:9px;}
.dash-hero-stat{flex:none;padding:0 26px;text-align:center;border-left:1px solid rgba(255,255,255,.22);position:relative;}
.dh-stat-n{font-size:30px;font-weight:800;color:#fff;line-height:1;display:flex;align-items:center;gap:8px;justify-content:center;}
.dh-stat-l{font-size:12px;font-weight:600;color:rgba(255,255,255,.8);margin-top:6px;}
.dash-split{display:flex;gap:24px;margin-top:24px;align-items:flex-start;}

.dash-secthead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}

.quests{display:flex;flex-direction:column;gap:12px;}
.quest{background:var(--card);border-radius:20px;padding:16px 18px;box-shadow:var(--card-shadow);display:flex;align-items:center;gap:15px;border:1px solid var(--border);}
.quest.done{opacity:.6;}
.quest-ic{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:23px;flex:none;}
.quest-main{flex:1;min-width:0;}
.quest-t{font-size:15.5px;font-weight:800;color:var(--text);}
.quest.done .quest-t{text-decoration:line-through;}
.quest-sub{font-size:12.5px;color:var(--muted2);margin-top:2px;}

.quest-chk.done{border:none;background:linear-gradient(135deg,#6D7BE6,#5159D6);}
.quest-chk.locked{cursor:default;opacity:0.45;}
.task-chk.locked{cursor:default;opacity:0.45;}
.dash-card{background:var(--card);border-radius:22px;padding:20px;box-shadow:var(--card-shadow);border:1px solid var(--border);}
.dash-card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.dash-card-head h3{font-size:15.5px;font-weight:800;margin:0;}
.dash-card-head span{font-size:12.5px;font-weight:700;color:#5563D8;cursor:pointer;}
.lbrow{display:flex;align-items:center;gap:11px;margin-bottom:11px;}
.lbrow:last-child{margin-bottom:0;}
.lbrow .medal{font-size:17px;width:22px;text-align:center;flex:none;}
.lbrow .lbav{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;flex:none;}
.lbrow .lbname{flex:1;font-size:14px;font-weight:800;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lbrow .lbpts{font-size:14px;font-weight:800;color:#5563D8;flex:none;}
.goal-card{background:linear-gradient(150deg,#6D7BE6,#5159D6);border-radius:22px;padding:20px;box-shadow:0 18px 36px -18px rgba(85,89,214,.6);position:relative;overflow:hidden;}
.goal-card::after{content:'';position:absolute;top:-26px;right:-16px;width:90px;height:90px;border-radius:50%;background:rgba(255,255,255,.1);}
.gc-cap{font-size:11px;font-weight:800;letter-spacing:.1em;color:rgba(255,255,255,.78);position:relative;}
.gc-name{font-size:17px;font-weight:800;color:#fff;margin-top:10px;position:relative;}
.gc-bar{height:9px;border-radius:999px;background:rgba(255,255,255,.25);overflow:hidden;margin-top:13px;position:relative;}
.gc-bar i{display:block;height:100%;border-radius:999px;background:#fff;}
.gc-note{font-size:12.5px;font-weight:700;color:rgba(255,255,255,.9);margin-top:9px;position:relative;}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:20px;margin-top:24px;}
@media (max-width:1080px){ .dash-split{flex-direction:column;} .dash-aside{width:auto;flex:none;align-self:stretch;} .dash-hero-stat{border-left:0;} }
@media (max-width:760px){ .page{padding:20px 16px 40px;} .dash-hero{flex-direction:column;align-items:stretch;} .dash-grid{grid-template-columns:1fr;} }

/* ── Desktop: show dashboard chrome, hide mobile bottom nav ── */
@media (min-width:768px){
  body{font-size:15px;}
  #sidebar{display:flex;}
  #topbar{display:flex;}
  .bnav{display:none;}
  .fab,#voice-fab{display:none;}
  #content{padding:6px 0 40px;}
  .screen{padding-bottom:0;}
  /* per-screen sticky header blends into the dashboard content */
  .topbar{position:static;background:transparent;padding:24px 32px 4px;}
  .topbar-left h1{font-size:28px;}
  /* let card lists breathe and form columns on wide screens */
  .stat-row,.lvl-wrap,.effort-card,.clean-card,.task-item,.room-card,.lb-card,.approval-card,.shdr,.tabs,.empty{max-width:1180px;}
  .shdr{padding-left:32px;padding-right:32px;}
  /* voice panel is positioned by JS (draggable/resizable) */
}

  #sidebar{width:78px;padding:20px 12px;}

@media (min-width:980px){
  [data-dash-grid]{display:grid !important;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:18px;padding:0 32px;}
  [data-dash-grid] > *{margin:0 !important;}
}

function getFreq(key){ return t('freq_'+key)||{daily:'Codziennie',every2:'Co 2 dni',weekly:'Co tydzień',biweekly:'Co 2 tyg.',monthly:'Co miesiąc'}[key]||key; }

let _lang = localStorage.getItem('ch_lang') || 'en';
function t(key){ return (LANGS[_lang]||LANGS.pl)[key] || LANGS.pl[key] || key; }
function setLang(lang){ _lang = lang; localStorage.setItem('ch_lang',''+lang); applyStaticLang(); render(); if(state.tab==='lb') loadLeaderboard(); }

let _theme = localStorage.getItem('ch_theme') || 'light';
function applyTheme(){
  document.documentElement.classList.toggle('dark', _theme==='dark');
  const mc = document.querySelector('meta[name="theme-color"]');
  if(mc) mc.setAttribute('content', _theme==='dark' ? '#191527' : '#F4F2FC');
}
function setTheme(mode){ _theme = mode; localStorage.setItem('ch_theme', mode); applyTheme(); if(typeof render==='function' && state && state.data) render(); }
function toggleTheme(){ setTheme(_theme==='dark' ? 'light' : 'dark'); }
applyTheme();
function applyStaticLang(){
  // nav labels
  const navMap = {home:'nav_home',rooms:'nav_rooms',tasks:'nav_tasks',lb:'nav_lb',cal:'nav_cal',goals:'nav_goals',badges:'nav_badges',settings:'nav_settings'};
  document.querySelectorAll('.bnav-btn[data-tab]').forEach(btn=>{
    const tab = btn.dataset.tab;
    if(navMap[tab]) btn.childNodes[btn.childNodes.length-1].textContent = t(navMap[tab]);
  });
  // sidebar labels
  document.querySelectorAll('.side-item[data-tab]').forEach(btn=>{
    const tab = btn.dataset.tab;
    const lbl = btn.querySelector('.side-label');

function getLevel(pts){ let l=0; LV_PTS.forEach((t,i)=>{ if(pts>=t)l=i; }); return l; }
function lvProg(pts){ const l=getLevel(pts),c=LV_PTS[l],n=LV_PTS[l+1]; if(!n)return 100; return Math.round(((pts-c)/(n-c))*100); }
function nextLvPts(pts){ const l=getLevel(pts); return LV_PTS[l+1]||null; }

function isDue(task){
  if(task.one_time) return !task.last_completed; // one-time: due until completed
  if(task.specific_days){
    const todayDow = (new Date().getDay()+6)%7;
    const chosen = task.specific_days.split(',').map(Number);
    if(!chosen.includes(todayDow)) return false;
    if(!task.last_completed) return true;
    return new Date(task.last_completed).toDateString() !== new Date().toDateString();
  }
  if(!task.last_completed) return true;
  const last = new Date(task.last_completed);
  const days = FREQ_DAYS[task.freq]||7;
  return (Date.now()-last.getTime()) >= days*86400000;
}

function isExpired(task){
  if(task.one_time) return false; // one-time tasks never "expire" — they just wait
  if(task.specific_days){
    const todayDow = (new Date().getDay()+6)%7;
    const chosen = task.specific_days.split(',').map(Number);
    const todayStart = new Date(); todayStart.setHours(0,0,0,0);
    for(const dow of chosen){
      const daysBack = ((todayDow - dow)+7)%7;
      if(daysBack === 0) continue;
      const occDate = new Date(todayStart);
      occDate.setDate(todayStart.getDate() - daysBack);
      const lastDone = task.last_completed ? new Date(task.last_completed) : null;
      if(!lastDone || lastDone < occDate) return true;
    }
    return false;
  }
  const ref = task.last_completed ? new Date(task.last_completed)
            : task.created_at     ? new Date(task.created_at) : null;
  if(!ref) return false;
  const freqDays = FREQ_DAYS[task.freq] || 7;
  const overdueDays = (Date.now() - ref.getTime()) / 86400000 - freqDays;
  return overdueDays > freqDays; // missed the whole window (2× freq elapsed)
}

let _expiringNow = false;
async function autoExpireTasks(){
  if(_expiringNow || !state.data) return;
  const toExpire = state.data.tasks.filter(t => isExpired(t));
  if(toExpire.length === 0) return;
  _expiringNow = true;
  await Promise.all(toExpire.map(t => POST(`/api/tasks/${t.id}/expire`, {})));
  _expiringNow = false;
  await loadData();
}

function fmtSchedule(task){
  if(task.one_time) return t('task_one_time_sched');
  if(task.specific_days){
    const names=['Pn','Wt','Śr','Cz','Pt','Sb','Nd'];
    return task.specific_days.split(',').map(Number).sort().map(d=>names[d]).join(', ');
  }
  return getFreq(task.freq);
}
function daysSince(iso){
  if(!iso) return null;
  return Math.floor((Date.now()-new Date(iso).getTime())/86400000);
}
function fmtSince(iso){
  if(!iso) return t('room_never');
  const d=daysSince(iso);
  if(d===0) return t('room_today');
  if(d===1) return t('room_yesterday');
  return `${t('room_cleaned_ago')} ${d} ${t('room_days_ago')}`;
}
function fmtDt(iso){
  const d=new Date(iso);
  return d.toLocaleDateString('pl-PL',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
}

async function api(method, url, body){
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  return r.json();
}
const GET  = url => api('GET', url);
const POST = (url,b) => api('POST', url, b);
const PUT  = (url,b) => api('PUT',  url, b);
const DEL  = url => api('DELETE', url);

async function loadStats(){
  const s = await GET('/api/stats');
  if(!s || s.error) return;
  state.stats = s;
  const el = id => document.getElementById(id);
  if(el('hs-done'))   el('hs-done').textContent   = s.week_done;
  if(el('hs-pts'))    el('hs-pts').textContent    = s.week_pts;
  if(el('hs-streak')) el('hs-streak').textContent = s.family_streak;
  if(el('hs-top') && s.top_member)
    el('hs-top').textContent = `🏅 ${t('home_leader')}: ${s.top_member.emoji} ${s.top_member.name} (${s.top_member.count} ${t('home_tasks_lbl').toLowerCase()})`;

  // Heatmap — last 28 days, oldest left
  const hm = el('hs-heatmap');
  if(!hm) return;
  hm.innerHTML = '';
  const today = new Date(); today.setHours(0,0,0,0);
  let maxVal = 1;
  for(let i=27;i>=0;i--){
    const d = new Date(today); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    maxVal = Math.max(maxVal, s.heatmap[key]||0);
  }
  for(let i=27;i>=0;i--){
    const d = new Date(today); d.setDate(d.getDate()-i);
    const key = d.toISOString().slice(0,10);
    const cnt = s.heatmap[key]||0;
    const intensity = cnt===0 ? 0 : Math.max(0.15, cnt/maxVal);
    const cell = document.createElement('div');
    cell.style.cssText=`aspect-ratio:1;border-radius:2px;background:${cnt===0?'var(--bg3)':`rgba(109,123,230,${intensity})`};title="${key}: ${cnt}"`;
    cell.title = `${key}: ${cnt} zadań`;
    hm.appendChild(cell);
  }
  // Labels
  const d28 = new Date(today); d28.setDate(d28.getDate()-27);
  if(el('hs-label-l')) el('hs-label-l').textContent = d28.toLocaleDateString('pl-PL',{day:'numeric',month:'short'});
}

const EMAIL_RE = /^[^@\s]+@[^@\s]+\.[^@\s]+$/;
async function doAuth(){
  const username = $('auth-username').value.trim();
  const password = $('auth-password').value.trim();
  const errEl = $('auth-error');
  errEl.style.display = 'none';
  if(!username||!password){ errEl.style.display='block'; errEl.textContent='Wypełnij wszystkie pola'; return; }
  if(authMode==='login' && !EMAIL_RE.test(username)){ errEl.style.display='block'; errEl.textContent='Podaj poprawny adres email'; return; }
  const url = authMode==='login' ? '/api/auth/login' : '/api/auth/register';
  const body = {username, password};
  if(authMode==='register'){
    const email = $('auth-email').value.trim();
    if(!email || !EMAIL_RE.test(email)){ errEl.style.display='block'; errEl.textContent='Podaj poprawny adres email'; return; }
    if(!$('auth-gdpr').checked){ errEl.style.display='block'; errEl.textContent='Musisz zaakceptować politykę prywatności'; return; }
    body.email = email;
    body.action = householdAction;
    if(householdAction === 'join'){
      const tok = $('auth-token').value.trim().toUpperCase();
      if(tok.length < 6){ errEl.style.display='block'; errEl.textContent='Wpisz 6-znakowy kod rodziny'; return; }
      body.token = tok;
      const mid = $('auth-member').value;
      if(!mid){ errEl.style.display='block'; errEl.textContent=t('auth_err_member'); return; }
      body.member_id = mid;
    } else {
      body.household_name = $('auth-hname').value.trim() || 'Moja Rodzina';
      body.display_name = $('auth-displayname').value.trim() || username;
      body.emoji = _selectedAuthEmoji || '😊';
    }
  }
  const res = await POST(url, body);
  if(res.error){ errEl.style.display='block'; errEl.textContent=res.error; return; }
  state.user = res.user;
  state.household = res.household;
  $('screen-auth').style.display = 'none';
  $('bnav').style.display = 'flex';
  await loadData();
  requestNotificationPermission();
  // Show token to new home creator
  if(authMode==='register' && householdAction==='create' && res.household){
    showTokenWelcome(res.household.token, res.household.name);
  }
}

// ─── NOTIFICATIONS ────────────────────────────────────────────
function requestNotificationPermission(){
  if(!('Notification' in window)) return;
  if(Notification.permission === 'default'){
    Notification.requestPermission();
  }
}
function scheduleNotifications(){
  if(!('Notification' in window) || Notification.permission !== 'granted') return;
  if(!state.data) return;
  const due = state.data.tasks.filter(t => {
    if(!t.last_completed) return true;
    const freq = {daily:1,every2:2,weekly:7,biweekly:14,monthly:30}[t.freq]||7;
    const last = new Date(t.last_completed);
    return (Date.now()-last.getTime()) >= freq*86400000;
  });
  if(due.length > 0){
    setTimeout(()=>{
      new Notification('🧹 CleanHabit', {
        body: `Masz ${due.length} zadań do wykonania dzisiaj!`,
        icon: '/static/icon-192.png'
      });
    }, 3000);
  }
}

// ─── CALENDAR ─────────────────────────────────────────────────
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-based
let calFilterMember = null; // null on first render -> defaults to state.user.member_id

async function renderCalendar(){
  const d0 = state.data;
  if(calFilterMember===null) calFilterMember = (state.user?.member_id) || 'all';
  const month = await GET(`/api/calendar?year=${calYear}&month=${calMonth+1}&memberId=${calFilterMember}`);
  const today = new Date().toISOString().slice(0,10);
  const _locale = _lang==='en'?'en-GB':_lang==='uk'?'uk-UA':'pl-PL';
  const MONTHS_PL = Array.from({length:12},(_,i)=>new Date(calYear,i,1).toLocaleDateString(_locale,{month:'long'}).replace(/^./,c=>c.toUpperCase()));
  const DOW = t('cal_days').split(',');

  // Build day map
  const dayMap = {};
  for(const d of month) dayMap[d.date] = d;

  // First day of month (0=Sun..6=Sat → convert to Mon-start 0-6)
  const firstDate = new Date(calYear, calMonth, 1);
  let startDow = firstDate.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // Mon=0..Sun=6
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();

  let html = `
  <div class="topbar" style="padding-bottom:8px">
    <div class="topbar-left">
      <h1>📅 ${t('nav_cal')}</h1>
    </div>
  </div>

  <!-- Member filter -->
  <div class="chips" style="padding:0 16px 12px">
    <button class="chip${calFilterMember==='all'?' on':''}" onclick="calFilterMember='all';renderCalendar()">${t('cal_filter_all')||'Wszyscy'}</button>
    ${(d0?.members||[]).map(m=>`<button class="chip${calFilterMember===m.id?' on':''}" onclick="calFilterMember='${m.id}';renderCalendar()">${m.emoji||'🙂'} ${esc(m.name)}</button>`).join('')}
  </div>

  <!-- Month nav -->
  <div style="display:flex;align-items:center;justify-content:space-between;padding:0 16px 14px">
    <button onclick="calNav(-1)" style="
      width:38px;height:38px;border-radius:12px;border:1px solid var(--border);
      background:var(--card);color:var(--text);font-size:20px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    ">‹</button>
    <div style="font-size:18px;font-weight:900;color:var(--blue2)">
      ${MONTHS_PL[calMonth]} ${calYear}
    </div>
    <button onclick="calNav(1)" style="
      width:38px;height:38px;border-radius:12px;border:1px solid var(--border);
      background:var(--card);color:var(--text);font-size:20px;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
    ">›</button>
  </div>

  <!-- Day-of-week header -->
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 12px;margin-bottom:3px">
    ${DOW.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--muted2);padding:4px 0">${d}</div>`).join('')}
  </div>

  <!-- Grid -->
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:0 12px 24px">`;

  // Empty cells before day 1
  for(let i=0;i<startDow;i++){
    html += `<div></div>`;
  }

  for(let day=1; day<=daysInMonth; day++){
    const iso = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const info = dayMap[iso];
    const tasks = info?.tasks || [];
    const isToday = iso === today;
    const isDow6 = (startDow + day - 1) % 7; // 5=Sat,6=Sun
    const isWeekend = isDow6 >= 5;
    const hasDue = tasks.some(t=>!t.done);
    const allDone = tasks.length > 0 && tasks.every(t=>t.done);

    // Choose tile style
    let bg = 'var(--card)';
    let border = '1px solid var(--border)';
    let dayNumColor = isWeekend ? 'var(--red)' : 'var(--text)';
    if(isToday){
      bg = 'rgba(109,123,230,0.15)';
      border = '2px solid var(--blue)';
      dayNumColor = 'var(--blue2)';
    } else if(allDone){
      bg = 'rgba(34,197,94,0.08)';
      border = '1px solid rgba(34,197,94,0.25)';
    } else if(hasDue){
      bg = 'rgba(234,179,8,0.06)';
      border = '1px solid rgba(234,179,8,0.2)';
    }

    // Dot indicators (max 3)
    const DIFF_DOT = {easy:'#22C55E',medium:'#F59E0B',hard:'#EF4444'};
    const dots = tasks.slice(0,3).map(t=>`
      <span style="width:5px;height:5px;border-radius:50%;flex-shrink:0;
        background:${t.done?'rgba(255,255,255,0.2)':DIFF_DOT[t.diff]||'var(--blue)'};
        display:inline-block;"></span>`).join('');

    html += `
    <div onclick="calDayClick('${iso}')" style="
      background:${bg};border:${border};border-radius:10px;
      padding:5px 4px 5px;min-height:54px;cursor:pointer;
      display:flex;flex-direction:column;align-items:center;
      transition:all 0.15s;position:relative;overflow:hidden;
    ">
      <div style="font-size:13px;font-weight:${isToday?'900':'700'};color:${dayNumColor};line-height:1;margin-bottom:4px">${day}</div>
      ${allDone?`<div style="font-size:14px">✅</div>`:''}
      ${!allDone && dots ? `<div style="display:flex;gap:2px;flex-wrap:wrap;justify-content:center">${dots}</div>` : ''}
      ${tasks.length > 3 ? `<div style="font-size:8px;color:var(--muted2);margin-top:2px">+${tasks.length-3}</div>` : ''}
    </div>`;
  }

  html += `</div>`;

  // Selected day detail (placeholder)
  html += `<div id="cal-detail" style="padding:0 12px 32px"></div>`;

  $('screen-cal').innerHTML = html;
  _calDayMap = dayMap;
}

let _calDayMap = {};

function calNav(dir){
  calMonth += dir;
  if(calMonth > 11){ calMonth=0; calYear++; }
  if(calMonth < 0) { calMonth=11; calYear--; }

}

function calDayClick(iso){
  const info = _calDayMap[iso] || {tasks:[]};
  const tasks = info.tasks || [];
  const DIFF_COLOR = {easy:'var(--green)',medium:'var(--amber)',hard:'var(--red)'};
  const [y,m,d] = iso.split('-');

  let html = `
  <div style="background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px">

async function completeTask(taskId, chkEl){
  const task = state.data.tasks.find(t=>t.id===taskId);
  if(!task) return;
  const r = await POST(`/api/tasks/${taskId}/complete`, {memberId: task.assigned_to});
  if(r.pending_approval){
    showFloat(chkEl.getBoundingClientRect().left, chkEl.getBoundingClientRect().top-30, '⏳ Czeka na akceptację');
    await loadData();
    return;
  }
  const rect = chkEl.getBoundingClientRect();
  showFloat(rect.left, rect.top-30, `+${r.pts} pkt &nbsp; 🪙 +${r.coins}`);
  await loadData();
  if(r.new_badges && r.new_badges.length > 0) showBadgeToast(r.new_badges);
}

function renderHome(d){
  const dueTasks    = d.tasks.filter(isDue);
  const expiredTasks= d.tasks.filter(t => isExpired(t) && !isDue(t));
  const doneTodayIds = (d.history||[])
    .filter(h=>new Date(h.completed_at)>new Date(Date.now()-86400000))
    .map(h=>h.task_id);
  const missedTodayIds = (d.history||[])
    .filter(h=>h.type==='missed' && new Date(h.completed_at)>new Date(Date.now()-86400000*2))
    .map(h=>h.task_id);
  const pendingApprovalIds = new Set((d.approvals||[]).map(a=>a.task_id));
  if(!state.questFilterMember) state.questFilterMember = state.user?.member_id || (d.members[0] && d.members[0].id) || null;

  const pending = dueTasks.filter(t=>!doneTodayIds.includes(t.id) && !pendingApprovalIds.has(t.id) && (!t.assigned_to || t.assigned_to===_filterMember));
  const effortToday = (d.history||[])
    .filter(h=>new Date(h.completed_at)>new Date(Date.now()-86400000))
    .reduce((a,h)=>a+h.pts,0);
  const effortGoal = 20;
  const effortPct = Math.min(100,Math.round((effortToday/effortGoal)*100));
  const avgClean = d.rooms.length ? Math.round(d.rooms.reduce((a,r)=>a+r.cleanliness,0)/d.rooms.length) : 0;
  const top = d.members.length ? [...d.members].sort((a,b)=>b.points-a.points)[0] : null;
  const totalCoins = d.members.reduce((a,m)=>a+m.coins,0);
  const effortBarColor = effortPct>=100?'#2FB877':effortPct>=60?'#8E97F2':'#6D7BE6';

  const _myMember = state.user?.member_id ? d.members.find(m=>m.id===state.user.member_id) : null;
  const _meName = _myMember ? _myMember.name : (state.user?.username || d.household);
  const _meEmoji = _myMember ? _myMember.emoji : '🏠';
  const _myPts = _myMember ? _myMember.points : 0;
  const _myLvl = getLevel(_myPts);
  const _myStreak = _myMember ? (_myMember.streak||0) : 0;
  const _myCoins = _myMember ? _myMember.coins : totalCoins;
  const _lvPct = lvProg(_myPts);
  const _nextPts = nextLvPts(_myPts);
  const _hr = new Date().getHours();
  const _greet = _hr<12 ? (_lang==='pl'?'dzień dobry':_lang==='uk'?'доброго ранку':'good morning')

  const _COINS = _lang==='pl'?'monety':_lang==='uk'?'монети':'coins';

  // ── Today screen rebuilt to the Web App design ──
  const _dateStr = new Date().toLocaleDateString(_lang==='en'?'en-GB':_lang==='uk'?'uk-UA':'pl-PL',{weekday:'long',day:'numeric',month:'long'});
  const _qn = pending.length;

  const _QUESTS_H = _lang==='pl'?'zadania na dziś':_lang==='uk'?'завдання на сьогодні':"today's quests";
  const _VIEWALL = _lang==='pl'?'wszystkie':_lang==='uk'?'усі':'view all';
  const _THISWEEK = _lang==='pl'?'ten tydzień':_lang==='uk'?'цей тиждень':'this week';
  const _FAMILY = _lang==='pl'?'rodzina':_lang==='uk'?'родина':'family';
  const _ACTIVEGOAL = _lang==='pl'?'AKTYWNY CEL RODZINY':_lang==='uk'?'АКТИВНА ЦІЛЬ РОДИНИ':'ACTIVE FAMILY GOAL';
  const _FORWORD = _lang==='pl'?'dla ':_lang==='uk'?'для ':'for ';
  const _AWAIT = _lang==='pl'?'czeka na akceptację':_lang==='uk'?'очікує підтвердження':'awaiting approval';
  const _pal = ['#E7F1FF','#FFF1D6','#E1F1FB','#EFE7FF','#DCF1E6','#FFE4EC'];

  const _isAdmin = state.user?.role === 'admin';
  const _filterChips = (d.members||[]).map(m=>`<button class="chip${_filterMember===m.id?' on':''}" onclick="state.questFilterMember='${m.id}';renderHome(state.data)">${m.emoji||'🙂'} ${esc(m.name)}</button>`).join('');
  let questsHtml = '';
  (d.approvals||[]).filter(ap=>ap.member_id===_filterMember).forEach(ap=>{
    const tk=d.tasks.find(t=>t.id===ap.task_id), mbr=d.members.find(m=>m.id===ap.member_id);
    questsHtml += `<div class="quest"><span class="quest-ic" style="background:#FFF1D6">⏳</span><div class="quest-main"><div class="quest-t">${esc(tk?.name||'?')}</div><div class="quest-sub">${mbr?.emoji||''} ${esc(mbr?.name||'')} · ${_AWAIT}</div></div>${_isAdmin?`<div style="display:flex;gap:8px;flex:none"><button class="btn btn-success btn-xs" onclick="handleApproval('${ap.id}',true)">✓</button><button class="btn btn-danger btn-xs" onclick="handleApproval('${ap.id}',false)">✕</button></div>`:''}</div>`;
  });
  if(_qn===0 && doneTodayIds.length===0){
    questsHtml += `<div class="empty"><div class="ico">☀️</div><p>${t('home_no_tasks_add').replace('\n','<br>')}</p></div>`;
  }
  pending.forEach((task,i)=>{
    const room=d.rooms.find(r=>r.id===task.room_id), mbr=d.members.find(m=>m.id===task.assigned_to);
    const pts=DIFF_PTS[task.diff]||1, bg=_pal[i%_pal.length], ico=room?room.emoji:'🧹';
    const sub=`${room?esc(room.name):''}${room&&mbr?' · ':''}${mbr?_FORWORD+esc(mbr.name):''}` || fmtSchedule(task);
    const _can = canCompleteTask(task);
    questsHtml += `<div class="quest" id="ti-${task.id}"><span class="quest-ic" style="background:${bg}">${ico}</span><div class="quest-main"><div class="quest-t">${esc(task.name)}</div><div class="quest-sub">${sub}</div></div><span class="quest-coins"><span class="coin" style="width:14px;height:14px"></span>${pts}</span><span class="quest-chk${_can?'':' locked'}" onclick="${_can?`handleCheck('${task.id}',this)`:'void 0'}">${_can?'':'🔒'}</span></div>`;
  });
  d.tasks.filter(t=>doneTodayIds.includes(t.id) && (!t.assigned_to || t.assigned_to===_filterMember)).forEach((task,i)=>{
    const room=d.rooms.find(r=>r.id===task.room_id), mbr=d.members.find(m=>m.id===task.assigned_to);
    const pts=DIFF_PTS[task.diff]||1, bg=_pal[i%_pal.length], ico=room?room.emoji:'✅';
    questsHtml += `<div class="quest done"><span class="quest-ic" style="background:${bg}">${ico}</span><div class="quest-main"><div class="quest-t">${esc(task.name)}</div><div class="quest-sub">${room?esc(room.name):''}${room&&mbr?' · ':''}${mbr?esc(mbr.name):''}</div></div><span class="quest-coins"><span class="coin" style="width:14px;height:14px"></span>${pts}</span><span class="quest-chk done"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12.5 4.5 4.5L19 7.5"/></svg></span></div>`;
  });

  const _top3=[...d.members].sort((a,b)=>b.points-a.points).slice(0,3);
  const _medals=['🥇','🥈','🥉'], _avbg=['#EFEAFB','#EAF0FB','#FBEFE3'];
  let lbRows='';
  _top3.forEach((m,i)=>{ lbRows += `<div class="lbrow"><span class="medal">${_medals[i]}</span><span class="lbav" style="background:${_avbg[i]}">${m.emoji}</span><span class="lbname">${esc(m.name)}</span><span class="lbpts">${m.points}</span></div>`; });
  let asideHtml = `<div class="dash-card"><div class="dash-card-head"><h3>🏆 ${_THISWEEK}</h3><span onclick="setTab('lb')">${_FAMILY}</span></div>${lbRows||`<div style="font-size:13px;color:var(--muted2)">—</div>`}</div>`;
  if((d.goals||[]).length>0){
    const g=[...d.goals].sort((a,b)=>b.price-a.price)[0];
    const pct=Math.min(100,Math.round((totalCoins/Math.max(1,g.price))*100));
    asideHtml += `<div class="goal-card"><div class="gc-cap">${_ACTIVEGOAL}</div><div class="gc-name">${g.emoji||'🎯'} ${esc(g.name)}</div><div class="gc-bar"><i style="width:${pct}%"></i></div><div class="gc-note">${totalCoins} / ${g.price} ${_COINS} · ${pct}%</div></div>`;
  }

  $('screen-home').innerHTML = `
  <div class="page">
    <div class="page-head">
      <div>
        <h1 class="page-h1">${_greet}, ${esc(_meName)} 🌿</h1>
        <p class="page-sub">${_dateStr} · ${_questsLine}</p>
      </div>
      <button class="dash-btn" onclick="showAddTask()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>${_newTaskLbl}</button>
    </div>

    <div class="dash-hero">
      <div class="dash-hero-main">
        <div class="dh-cap">${_PROG}</div>
        <div class="dh-big">${_myPts} <span>/ ${_nextPts!=null?_nextPts:_myPts} ${_PKT}</span></div>
        <div class="dh-bar"><i style="width:${_lvPct}%"></i></div>
        <div class="dh-note">${_nextPts!=null?`${_nextPts-_myPts} ${_PKT} → ${_LVL} ${_myLvl+1} 🚀`:(_lang==='pl'?'Maksymalny poziom 🚀':_lang==='uk'?'Максимальний рівень 🚀':'Max level 🚀')}</div>
      </div>
      <div class="dash-hero-stat"><div class="dh-stat-n">🔥 ${_myStreak}</div><div class="dh-stat-l">${_STREAK}</div></div>
      <div class="dash-hero-stat"><div class="dh-stat-n"><span class="coin" style="width:22px;height:22px"></span> ${_myCoins}</div><div class="dh-stat-l">${_COINS}</div></div>
    </div>

    <div class="dash-split">
      <div class="dash-main">
        <div class="dash-secthead"><h2>${_QUESTS_H}</h2><span onclick="setTab('tasks')">${_VIEWALL}</span></div>
        <div class="chips" style="margin:0 0 14px">${_filterChips}</div>
        <div class="quests">${questsHtml}</div>
      </div>
      <div class="dash-aside">${asideHtml}</div>
    </div>
  </div>`;
  return;

  let html = `OLD_UNUSED`;

  // APPROVALS
  if((d.approvals||[]).length > 0){
    html += `<div class="shdr"><h2>🔔 ${t('home_approval')}</h2></div>`;
    d.approvals.forEach(ap=>{
      const task = d.tasks.find(t=>t.id===ap.task_id);
      const mbr  = d.members.find(m=>m.id===ap.member_id);
      html += `
      <div class="approval-card">
        <span style="font-size:26px">⏳</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:14px">${esc(task?.name||'?')}</div>
          <div style="font-size:12px;color:var(--muted2)">${mbr?.emoji} ${esc(mbr?.name||'?')}</div>
        </div>
        <div style="display:flex;gap:8px">
          <button class="btn btn-success btn-xs" onclick="handleApproval('${ap.id}',true)">✓ OK</button>
          <button class="btn btn-danger btn-xs" onclick="handleApproval('${ap.id}',false)">✕</button>
        </div>
      </div>`;
    });
  }

  // EXPIRED TASKS SECTION
  if(expiredTasks.length > 0){
    html += `
    <div class="shdr" style="margin-top:4px">
      <h2 style="color:var(--red)">💀 ${t('home_missed')}</h2>
      <span style="color:var(--red);font-size:12px">${expiredTasks.length} ${t('home_tasks_lbl').toLowerCase()}</span>
    </div>
    <div style="margin:0 16px 4px;background:rgba(239,68,68,0.06);border:1px solid rgba(239,68,68,0.2);border-radius:16px;padding:10px 14px;font-size:12px;color:rgba(239,68,68,0.8);line-height:1.5">
      ⏰ Nie zdążyłeś — te zadania wygasły. Szansa na monety przepadła. Pojawią się znowu w kolejnym cyklu.
    </div>`;
    expiredTasks.forEach(task=>{
      const room = d.rooms.find(r=>r.id===task.room_id);
      const mbr  = d.members.find(m=>m.id===task.assigned_to);
      const pts  = DIFF_PTS[task.diff]||1;
      const freqDays = task.specific_days ? null : (FREQ_DAYS[task.freq]||7);
      const ref  = task.last_completed ? new Date(task.last_completed) : new Date(task.created_at);
      const daysLate = Math.floor((Date.now() - ref.getTime())/86400000) - (freqDays||0);
      html += `
      <div class="task-item" style="opacity:0.6;border-color:rgba(239,68,68,0.3);background:rgba(239,68,68,0.05)">
        <div style="width:30px;height:30px;border-radius:50%;background:rgba(239,68,68,0.15);border:2px solid rgba(239,68,68,0.4);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px">💀</div>
        <div style="flex:1;min-width:0">
          <div class="task-name" style="text-decoration:line-through;color:var(--muted2)">${esc(task.name)}</div>
          <div class="task-meta">
            ${room?`<span>${room.emoji} ${esc(room.name)}</span><span class="dot">·</span>`:''}
            ${mbr?`<span>${mbr.emoji} ${esc(mbr.name)}</span><span class="dot">·</span>`:''}
            <span style="color:var(--red)">${freqDays?`${daysLate} dni po terminie`:'Minął termin'}</span>
          </div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-size:11px;color:rgba(239,68,68,0.7);font-weight:700;text-decoration:line-through">+${pts} pkt</div>
          <div style="font-size:10px;color:var(--muted2)">🪙 stracono</div>
        </div>
      </div>`;
    });
  }

  // TODAY TASKS
  html += `<div class="shdr" style="margin-top:4px"><h2>📋 ${t('home_todo')}</h2><span>${pending.length} ${t('home_tasks_lbl').toLowerCase()}</span></div>`;

  if(pending.length===0 && doneTodayIds.length===0 && expiredTasks.length===0){
    html += `<div class="empty"><div class="ico">☀️</div><p>${t('home_no_tasks_add').replace('\n','<br>')}</p></div>`;
  } else if(pending.length===0 && expiredTasks.length===0){
    html += `<div class="empty"><div class="ico">🎉</div><p>${t('home_all_done').replace('\n','<br><strong>').replace(/$/,'</strong>')}</p></div>`;
  }

  pending.forEach(task=>{
    const room = d.rooms.find(r=>r.id===task.room_id);
    const mbr  = d.members.find(m=>m.id===task.assigned_to);
    const pts  = DIFF_PTS[task.diff]||1;
    const freqDays = FREQ_DAYS[task.freq]||7;
    const ref  = task.last_completed ? new Date(task.last_completed) : new Date(task.created_at||Date.now());
    const overdueDays = Math.floor((Date.now()-ref.getTime())/86400000) - freqDays;
    const isOverdue = overdueDays > 0;
    html += `
    <div class="task-item" id="ti-${task.id}" style="${isOverdue?'border-color:rgba(249,115,22,0.4);background:rgba(249,115,22,0.04)':''}">
      <div class="task-chk${isDue(task)?' due':''}" onclick="handleCheck('${task.id}',this)">
        <span style="font-size:11px;color:var(--muted2)">○</span>
      </div>
      <div style="flex:1;min-width:0">
        <div class="task-name">${task.one_time?'<span style="font-size:11px;background:rgba(245,158,11,0.15);color:var(--yellow);border-radius:6px;padding:1px 5px;font-weight:700;margin-right:5px">⚡ raz</span>':''}${esc(task.name)}</div>
        <div class="task-meta">
          ${room?`<span>${room.emoji} ${esc(room.name)}</span><span class="dot">·</span>`:''}
          ${mbr?`<span>${mbr.emoji} ${esc(mbr.name)}</span><span class="dot">·</span>`:''}
          ${isOverdue
            ? `<span style="color:var(--orange);font-weight:700">⚠️ Spóźnione ${overdueDays}d — zrób teraz!</span>`
            : `<span>${task.one_time?'Jednorazowe':fmtSchedule(task)}</span>`}
        </div>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div class="pts-pill">+${pts} pkt</div>
        <div class="coin-pill">🪙 +${pts}</div>
      </div>
    </div>`;
  });

  // ROOMS SUMMARY
  // WEEKLY STATS CARD (data injected async after render)
  html += `
  <div class="shdr" style="margin-top:6px"><h2>📊 ${t('home_week')}</h2></div>
  <div id="home-stats-card" style="margin:0 16px 4px;padding:16px;background:var(--bg2);border-radius:18px;border:1px solid var(--border)">
    <div style="display:flex;gap:0;justify-content:space-around;margin-bottom:14px">
      <div style="text-align:center">
        <div style="font-size:24px;font-weight:900;color:var(--blue2)" id="hs-done">—</div>
        <div style="font-size:10px;color:var(--muted2);font-weight:700;text-transform:uppercase;margin-top:2px">${t('home_tasks_lbl')}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:24px;font-weight:900;color:var(--yellow)" id="hs-pts">—</div>
        <div style="font-size:10px;color:var(--muted2);font-weight:700;text-transform:uppercase;margin-top:2px">${t('home_pts_lbl')}</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:24px;font-weight:900;color:var(--orange)" id="hs-streak">—</div>
        <div style="font-size:10px;color:var(--muted2);font-weight:700;text-transform:uppercase;margin-top:2px">${t('home_streak_lbl')} 🔥</div>
      </div>
    </div>
    <div id="hs-top" style="font-size:12px;color:var(--muted2);margin-bottom:12px;text-align:center"></div>
    <div style="font-size:10px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px">${t('home_activity')}</div>
    <div id="hs-heatmap" style="display:grid;grid-template-columns:repeat(28,1fr);gap:2px"></div>
    <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:9px;color:var(--muted2)">
      <span id="hs-label-l"></span><span id="hs-label-r">${t('nav_home')}</span>
    </div>
  </div>

  <div class="shdr" style="margin-top:6px"><h2>🏡 ${t('home_rooms_state')}</h2></div>`;
  d.rooms.forEach(r=>{
    const col = cleanColor(r.cleanliness);
    html += `
    <div style="display:flex;align-items:center;gap:13px;padding:10px 20px">
      <span style="font-size:26px;width:34px;text-align:center">${r.emoji}</span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
          <span style="font-size:14px;font-weight:700">${esc(r.name)}</span>
          <span style="font-size:13px;font-weight:700;color:${col}">${r.cleanliness}%</span>
        </div>
        <div class="pbar-track" style="height:7px">
          <div class="pbar-fill" style="width:${r.cleanliness}%;height:7px;background:${col}"></div>
        </div>
      </div>
    </div>`;
  });

  html += `<div style="height:8px"></div>`;
  $('screen-home').innerHTML = html;
}

// ═══════════════════════════════════════════
// ROOMS SCREEN
// ═══════════════════════════════════════════
function renderRooms(d){
  const doneTodayIds = (d.history||[])
    .filter(h=>new Date(h.completed_at)>new Date(Date.now()-86400000))
    .map(h=>h.task_id);

  let html = `
  <div class="topbar">
    <div class="topbar-left">
      <h1>${t('rooms_title')}</h1>
      <span>${d.rooms.length} ${t('rooms_count')}</span>
    </div>
    <div class="topbar-right">
      <button class="add-btn" onclick="showAddRoom()">+</button>
    </div>
  </div>`;

  if(d.rooms.length===0){
    html += `<div class="empty"><div class="ico">🏠</div><p>${t('rooms_empty').replace('\n','<br>')}</p></div>`;
  }

  d.rooms.forEach(room=>{
    const roomTasks = d.tasks.filter(t=>t.room_id===room.id);
    const overdue   = roomTasks.filter(t=>isDue(t) && !doneTodayIds.includes(t.id));
    const col = cleanColor(room.cleanliness);
    html += `
    <div class="room-card" onclick="openRoomDetail('${room.id}')">
      <div class="room-icon-box" style="background:${col}18">
        <span>${room.emoji}</span>
      </div>
      <div class="room-meta">
        <div class="room-name">${esc(room.name)}</div>
        <div class="room-since">${fmtSince(room.last_cleaned)}</div>
        <div class="room-pct-row">
          <span class="room-pct" style="color:${col}">${room.cleanliness}%</span>
          <span class="tag ${cleanTagClass(room.cleanliness)}">${cleanLabel(room.cleanliness)}</span>
        </div>
        <div class="pbar-track" style="height:8px;margin-bottom:8px">
          <div class="pbar-fill" style="width:${room.cleanliness}%;height:8px;background:${col}"></div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <span class="tag tag-b">${roomTasks.length} ${t('room_tasks_count')}</span>
          ${overdue.length>0?`<span class="tag tag-r">${overdue.length} ${t('home_missed')||'zaległe'}</span>`:''}
        </div>
      </div>
    </div>`;
  });

  html += `
  <div style="height:8px"></div>`;
  $('screen-rooms').innerHTML = html;
}

function openRoomDetail(roomId){
  const d = state.data;
  const room = d.rooms.find(r=>r.id===roomId);
  if(!room) return;
  const roomTasks = d.tasks.filter(t=>t.room_id===roomId);
  const doneTodayIds = (d.history||[])
    .filter(h=>new Date(h.completed_at)>new Date(Date.now()-86400000))
    .map(h=>h.task_id);
  const col = cleanColor(room.cleanliness);

  let tasksHtml = roomTasks.length===0
    ? `<div style="color:var(--muted2);font-size:13px;text-align:center;padding:20px 0">Brak zadań w tym pokoju</div>`
    : roomTasks.map(t=>{
        const mbr  = d.members.find(m=>m.id===t.assigned_to);
        const done = doneTodayIds.includes(t.id);
        const due  = isDue(t);
        return `
        <div style="display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--border)">
          <div class="task-chk ${done?'done':due?'due':''}" style="width:26px;height:26px"
            onclick="${!done?`handleCheck('${t.id}',this);setTimeout(()=>openRoomDetail('${roomId}'),500)`:'void 0'}">
            ${done?`<span style="color:#fff;font-size:13px">✓</span>`:due?`<span style="font-size:11px;color:var(--orange)">!</span>`:'<span style="font-size:10px;color:var(--muted2)">○</span>'}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700;text-decoration:${done?'line-through':'none'}">${esc(t.name)}</div>
            <div style="font-size:12px;color:var(--muted2)">${mbr?.emoji||''} ${esc(mbr?.name||'?')} · ${fmtSchedule(t)} · ${DIFF_STARS[t.diff]}</div>
          </div>
          <span class="pts-pill">+${DIFF_PTS[t.diff]} pkt</span>
        </div>`;
      }).join('');

  openModal(`
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-size:54px;margin-bottom:10px">${room.emoji}</div>
      <div style="font-size:22px;font-weight:800">${esc(room.name)}</div>
      <div style="font-size:12px;color:var(--muted2);margin-top:4px">${fmtSince(room.last_cleaned)}</div>
      <div style="display:flex;justify-content:center;align-items:center;gap:10px;margin-top:12px">
        <span style="font-size:30px;font-weight:800;color:${col}">${room.cleanliness}%</span>
        <span class="tag ${cleanTagClass(room.cleanliness)}" style="font-size:12px">${cleanLabel(room.cleanliness)}</span>
      </div>
      <div class="pbar-track" style="height:10px;margin-top:10px">
        <div class="pbar-fill" style="width:${room.cleanliness}%;height:10px;background:${col}"></div>
      </div>
    </div>
    <div class="divider"></div>
    <div style="font-weight:700;font-size:14px;margin-bottom:6px">Zadania (${roomTasks.length})</div>
    ${tasksHtml}
    <div style="display:flex;gap:10px;margin-top:18px">
      <button class="btn btn-danger btn-sm" style="flex:1;justify-content:center"
        onclick="if(confirm('Usunąć pokój ${esc(room.name)}?')){deleteRoom('${room.id}')}">
        🗑️ Usuń pokój
      </button>
      <button class="btn btn-ghost btn-sm" style="flex:1;justify-content:center" onclick="closeModal()">Zamknij</button>
    </div>
  `);
}

function showAddRoom(){
  openModal(`
    <h2>${t('room_new')}</h2>
    <div class="field">
      <label>${t('room_name')}</label>
      <input class="inp" id="room-name" placeholder="${t('room_name_ph')}" />
    </div>
    <div class="field">
      <label>${t('room_icon')}</label>
      <div class="egrid" id="room-emoji-grid"></div>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px"
      onclick="submitAddRoom()">${t('room_add')}</button>
  `);
  let selEmoji = '🛋️';

  ROOM_EMOJIS.forEach(em=>{

  });

}

}

function renderTasks(d){
  const doneTodayIds = (d.history||[])
    .filter(h=>new Date(h.completed_at)>new Date(Date.now()-86400000))
    .map(h=>h.task_id);
  const pendingApprovalIds = new Set((d.approvals||[]).map(a=>a.task_id));

  if(!state.taskFilterMember) state.taskFilterMember = state.user?.member_id || 'all';

  let tasks = d.tasks;
  if(state.filter_task==='today') tasks = tasks.filter(isDue);
  if(state.filter_task==='done')  tasks = tasks.filter(t=>doneTodayIds.includes(t.id));
  if(state.diff_filter!=='all')   tasks = tasks.filter(t=>t.diff===state.diff_filter);
  if(state.taskFilterMember!=='all') tasks = tasks.filter(t=>!t.assigned_to || t.assigned_to===state.taskFilterMember);

  let html = `
  <div class="topbar">
    <div class="topbar-left">
      <h1>${t('tasks_title')}</h1>
      <span>${d.tasks.length} ${t('tasks_total')}</span>
    </div>
    <div class="topbar-right">
      <button class="add-btn" onclick="showAddTask()">+</button>
    </div>
  </div>
  <div style="padding:0 16px;margin-bottom:10px">
    <div class="chips" style="margin-bottom:8px">
      <button class="chip${state.taskFilterMember==='all'?' on':''}" onclick="state.taskFilterMember='all';renderTasks(state.data)">${t('cal_filter_all')}</button>
      ${(d.members||[]).map(m=>`<button class="chip${state.taskFilterMember===m.id?' on':''}" onclick="state.taskFilterMember='${m.id}';renderTasks(state.data)">${m.emoji||'🙂'} ${esc(m.name)}</button>`).join('')}
    </div>
    <div class="chips" style="margin-bottom:8px">
      ${['all','today','done'].map(v=>`
        <button class="chip${state.filter_task===v?' on':''}" onclick="state.filter_task='${v}';renderTasks(state.data)">
          ${v==='all'?t('filter_all'):v==='today'?t('filter_today'):t('filter_done')}
        </button>`).join('')}
    </div>
    <div class="chips">
      ${['all','easy','medium','hard'].map(v=>`
        <button class="chip${state.diff_filter===v?' on':''}" onclick="state.diff_filter='${v}';renderTasks(state.data)">
          ${v==='all'?t('filter_all'):v==='easy'?`⭐ ${t('diff_easy')}`:v==='medium'?`⭐⭐ ${t('diff_medium')}`:`⭐⭐⭐ ${t('diff_hard')}`}
        </button>`).join('')}
    </div>
  </div>`;

  if(tasks.length===0){
    html += `<div class="empty"><div class="ico">📝</div><p>${t('task_no_filter')}</p></div>`;
  }

  tasks.forEach(task=>{
    const room = d.rooms.find(r=>r.id===task.room_id);
    const mbr  = d.members.find(m=>m.id===task.assigned_to);
    const done = doneTodayIds.includes(task.id);
    const pendingAppr = pendingApprovalIds.has(task.id);
    const due  = isDue(task);
    const pts  = DIFF_PTS[task.diff]||1;
    const canDo = canCompleteTask(task);
    html += `
    <div class="task-item${done?' done':''}" id="ti-${task.id}">
      <div class="task-chk${done?' done':pendingAppr?' pending':due?' due':''}${!done&&!pendingAppr&&!canDo?' locked':''}"
        onclick="${!done&&!pendingAppr&&canDo?`handleCheck('${task.id}',this)`:'void 0'}">
        ${done?'<span style="color:#fff;font-size:14px">✓</span>':pendingAppr?'<span style="font-size:13px">⏳</span>':!canDo?'<span style="font-size:11px">🔒</span>':due?'<span style="font-size:10px;color:var(--orange)">!</span>':'<span style="font-size:10px;color:var(--muted2)">○</span>'}
      </div>
      <div style="flex:1;min-width:0">
        <div class="task-name" style="text-decoration:${done?'line-through':'none'}">${esc(task.name)}</div>
        <div class="task-meta">
          ${room?`<span>${room.emoji} ${esc(room.name)}</span><span class="dot">·</span>`:''}
          ${mbr?`<span>${mbr.emoji} ${esc(mbr.name)}</span><span class="dot">·</span>`:''}
          <span>${fmtSchedule(task)}</span>
          ${pendingAppr?`<span class="dot">·</span><span style="color:var(--yellow);font-weight:700">⏳ ${t('task_pending_approval')}</span>`:task.approval_needed?`<span class="dot">·</span><span style="color:var(--yellow)">🔒 ${t('task_acceptance')}</span>`:''}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        <span class="pts-pill">+${pts} ${t('points_abbr')}</span>
        <span class="coin-pill">🪙 +${pts}</span>
        <button class="btn btn-ghost btn-xs" style="padding:3px 7px;font-size:11px"
          onclick="showEditTask('${task.id}')">✏️</button>
        <button class="btn btn-ghost btn-xs" style="color:var(--red);padding:3px 7px;font-size:11px"
          onclick="if(confirm(t('task_delete_confirm')))deleteTask('${task.id}')">✕</button>
      </div>
    </div>`;
  });

  html += `
  <div style="padding:12px 16px">
    <button class="btn btn-ghost" style="width:100%;justify-content:center" onclick="showSuggestions()">
      💡 ${t('task_suggestions')}
    </button>
  </div>
  <div style="height:8px"></div>`;
  $('screen-tasks').innerHTML = html;
}

      onclick="useSuggestion('${esc(s.name)}','${s.diff}')">
      <span style="font-size:14px;font-weight:600">${esc(s.name)}</span>

function showAddTask(prefillName='', prefillDiff='medium', existingTask=null){

  openModal(`

    <div class="field">
      <label>${t('modal_task_diff')}</label>
      <div class="chips" id="task-diff-chips"></div>
    </div>
    <div class="field">
      <label>${t('modal_task_type')}</label>
      <div style="display:flex;background:var(--bg3);border-radius:12px;padding:3px;gap:2px">
        <button id="type-tab-cycl" onclick="setTaskType('cyclic')" style="flex:1;padding:8px;border:none;border-radius:9px;cursor:pointer;font-size:12px;font-weight:700;background:var(--blue);color:#fff">${t('modal_task_cyclic')}</button>
        <button id="type-tab-once" onclick="setTaskType('once')" style="flex:1;padding:8px;border:none;border-radius:9px;cursor:pointer;font-size:12px;font-weight:700;background:transparent;color:var(--muted2)">${t('modal_task_once')}</button>
      </div>
      <div id="task-type-hint" style="font-size:11px;color:var(--muted2);margin-top:6px">${t('task_cyclic_hint')}</div>
    </div>
    <div id="task-schedule-wrap">
    <div class="field">
      <label>${t('modal_task_schedule')}</label>
      <div style="display:flex;background:var(--bg3);border-radius:12px;padding:3px;gap:2px;margin-bottom:12px">
        <button id="sched-tab-freq" onclick="setSchedMode('freq')" style="flex:1;padding:8px;border:none;border-radius:9px;cursor:pointer;font-size:12px;font-weight:700;background:var(--blue);color:#fff;transition:all 0.2s;">${t('modal_task_sched_freq')}</button>
        <button id="sched-tab-days" onclick="setSchedMode('days')" style="flex:1;padding:8px;border:none;border-radius:9px;cursor:pointer;font-size:12px;font-weight:700;background:transparent;color:var(--muted2);transition:all 0.2s;">${t('modal_task_sched_days')}</button>
      </div>
      <div id="sched-freq-panel"><div class="chips" id="task-freq-chips"></div></div>
      <div id="sched-days-panel" style="display:none">
        <div style="font-size:11px;color:var(--muted2);margin-bottom:10px">${t('modal_task_days_hint')}</div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px" id="task-dow-grid"></div>
        <div id="task-dow-hint" style="font-size:11px;color:var(--muted2);margin-top:8px;min-height:16px"></div>
      </div>
    </div>
    </div>

      <label>${t('modal_task_approval')}</label>

  let selOneTime = isEdit ? !!existingTask.one_time : false;

  let selDays = new Set(isEdit && existingTask.specific_days ? existingTask.specific_days.split(',').map(Number) : []); // weekday indices 0=Mon..6=Sun

  // freq chips
  const freqChips = $('task-freq-chips');
